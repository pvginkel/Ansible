services:
  llmbox:
    image: registry:5000/llmbox:latest
    network_mode: host
    pid: host
    working_dir: /work/Ansible
    tty: true
    user: "${UID}:${GID}"
    environment:
      TERM: "${TERM}"
      COLORTERM: "${COLORTERM}"
      HA_URL: "${HA_URL}"
      HA_TOKEN: "${HA_TOKEN}"
      KUBECONFIG: /home/ubuntu/claude-kubeconfig.yaml
      KUBE_NAMESPACE: development
    volumes:
      - ${HOME}/.claude.json:/home/ubuntu/.claude.json:rw
      - ${HOME}/.claude:/home/ubuntu/.claude:rw
      - ${HOME}/.codex:/home/ubuntu/.codex:rw
      - ${HOME}/.vimrc:/home/ubuntu/.vimrc:ro
      - ${HOME}/.gitconfig:/home/ubuntu/.gitconfig:ro
      - ${HOME}/.cache:/home/ubuntu/.cache:rw
      - ${HOME}/.terraformrc:/home/ubuntu/.terraformrc:ro
      - ${HOME}/claude-kubeconfig.yaml:/home/ubuntu/claude-kubeconfig.yaml:ro
      - .:/work/Ansible:rw
      - ../HelmCharts:/work/HelmCharts:ro
      - ../DockerImages:/work/DockerImages:ro
      - ../Obsidian:/work/Obsidian:rw
      - ../KubernetesConfig:/work/KubernetesConfig:ro
      - ../HomelabTerraformProvider:/work/HomelabTerraformProvider:rw