---
# Acquires a privileged OpenBao token into `_openbao_token`. Two paths:
#
#  1. openbao_admin_token (extra-var) — used on the first apply (root
#     token from `bao operator init`) and any rescue run. Wins over
#     the AppRole path so an operator with a fresh root token can
#     always push state.
#  2. openbao_admin_role_id / _secret_id (ansible-vault'd in
#     group_vars/openbao.yml) — steady state. Drift cycle authenticates
#     here; root token has been retired.
#
# If neither yields a usable token — credentials absent, or rejected
# by a fresh / not-yet-provisioned cluster with no admin AppRole yet —
# `_openbao_token` is set empty; calling tasks must
# `when: _openbao_token | length > 0` to skip cleanly. This lets a
# drift cycle, or a whole-cluster recovery converge, run end-to-end
# before the admin AppRole exists: auth tasks no-op, everything else
# converges.

- name: Use the operator-supplied admin token when present
  ansible.builtin.set_fact:
    _openbao_token: "{{ openbao_admin_token }}"
  no_log: true
  when: openbao_admin_token | length > 0

- name: Log in via the admin AppRole when no operator token is supplied
  ansible.builtin.uri:
    url: "{{ openbao_admin_api_addr }}/v1/auth/approle/login"
    method: POST
    body_format: json
    body:
      role_id: "{{ openbao_admin_role_id }}"
      secret_id: "{{ openbao_admin_secret_id }}"
    status_code: 200
    validate_certs: true
  register: _openbao_login
  no_log: true
  # Mints a short-TTL token (openbao_admin_token_ttl, default 1h) used
  # by the rest of the role's read/write tasks. Run in check mode too —
  # without a token the auth-gated block below skips, and `--check`
  # against site-openbao.yml reports 0 changes for any policy/role
  # diff the operator's trying to preview.
  check_mode: false
  # A fresh / not-yet-provisioned cluster has no admin AppRole, so the
  # login is rejected. Tolerate it and fall through to the empty-token
  # skip below rather than aborting the converge.
  failed_when: false
  when:
    - openbao_admin_token | length == 0
    - openbao_admin_role_id | length > 0
    - openbao_admin_secret_id | length > 0

- name: Capture the admin AppRole token
  ansible.builtin.set_fact:
    _openbao_token: "{{ _openbao_login.json.auth.client_token }}"
  no_log: true
  when: _openbao_login.json.auth.client_token is defined

- name: Warn when the admin AppRole login did not return a token
  ansible.builtin.debug:
    msg: >-
      Admin AppRole login returned no token (HTTP
      {{ _openbao_login.status | default('n/a') }}, msg:
      {{ _openbao_login.msg | default('n/a') }}); auth-dependent tasks
      will be skipped. Expected on a fresh or not-yet-provisioned
      cluster — e.g. a whole-cluster recovery before the snapshot
      restore. Otherwise check the ansible-vault'd
      openbao_admin_role_id / openbao_admin_secret_id.
  when:
    - _openbao_login is defined
    - not (_openbao_login.skipped | default(false))
    - _openbao_login.json.auth.client_token is not defined

- name: Default _openbao_token to empty when no token was acquired
  ansible.builtin.set_fact:
    _openbao_token: ""
  when: _openbao_token is not defined
