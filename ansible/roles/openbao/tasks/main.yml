---
- name: Assert role preconditions
  ansible.builtin.assert:
    that:
      - openbao_version | length > 0
      - openbao_deb_sha256 | length > 0
      - openbao_seal_current_key_id | length > 0
      - openbao_san_list | length > 0
    fail_msg: >-
      OpenBao role inputs missing. Most likely
      openbao_seal_current_key_id is unset in
      inventories/prd/group_vars/openbao.yml — set it when you commit
      the ansible-vault'd static seal key into roles/openbao/files/.
      See roles/openbao/README.md §Bootstrap.

# Election + cluster-init probe runs first so the init.yml gate below
# can rely on its facts.
- name: Elect bootstrap node + read cluster init state
  ansible.builtin.import_tasks: elect-bootstrap.yml

- name: Install OpenBao
  ansible.builtin.import_tasks: install.yml

# Subdirectories first so internal_tls has somewhere to write the leaf
# and config.yml has somewhere to drop the seal key.
- name: Ensure OpenBao subdirectories exist
  ansible.builtin.import_tasks: dirs.yml

- name: Issue the OpenBao listener TLS leaf
  ansible.builtin.import_tasks: internal_tls.yml

- name: Render config + place the static seal key
  ansible.builtin.import_tasks: config.yml

# Flush handlers here so a config / cert / seal-key change is applied
# before init runs — init talks to the running service and would
# otherwise hit the stale config.
- name: Apply pending restarts before init
  ansible.builtin.meta: flush_handlers

- name: Enable + start openbao.service
  ansible.builtin.systemd:
    name: openbao
    state: started
    enabled: true

# Acceptable health-endpoint codes:
#   200 initialized + unsealed + active
#   429 initialized + unsealed + standby (Raft follower)
#   501 not initialized
#   503 sealed
# Anything in that set means the listener is up and we can move on.
- name: Wait for the OpenBao API to be reachable
  ansible.builtin.uri:
    url: "{{ openbao_api_addr }}/v1/sys/health"
    status_code: [200, 429, 501, 503]
    validate_certs: true
  register: _openbao_health
  until: _openbao_health.status is defined and _openbao_health.status in [200, 429, 501, 503]
  retries: 30
  delay: 2

- name: Initialize the cluster (bootstrap node only, first time)
  ansible.builtin.import_tasks: init.yml
  when:
    - inventory_hostname == openbao_bootstrap_host
    - not openbao_cluster_initialized | bool

# Non-bootstrap nodes join the cluster the bootstrap node just (or
# previously) initialized. The local-initialized check is the
# idempotency boundary — a node that's already a voter inherits the
# cluster's initialized state via Raft, so sys/health here reports
# initialized=true and the join is skipped.
- name: Raft-join the cluster (non-bootstrap nodes)
  ansible.builtin.import_tasks: join.yml
  when:
    - inventory_hostname != openbao_bootstrap_host
    - openbao_cluster_initialized | bool
    - not (_openbao_health.json.initialized | default(false))

# Port-fronting + leader-tracking VIP run after the cluster is up:
# haproxy needs the local listener responding to its httpchk, and the
# vrrp_script needs /v1/sys/leader to return a real answer. Greenfield
# converge under `serial: 1` keeps these strictly ordered after init
# and join.
- name: Port-front 443 → 8200 (haproxy, tcp pass-through)
  ansible.builtin.import_tasks: haproxy.yml

- name: Configure the secrets.home VIP (keepalived, leader-tracking)
  ansible.builtin.import_tasks: keepalived.yml

# Card #11 — systemd hardening drop-in. Runs unconditionally; takes
# effect on first apply and after any drop-in edit. Notifies a
# daemon-reload + restart on change. Independent of OpenBao auth
# state, so it lands before the auth tasks below.
- name: Apply systemd hardening drop-in
  ansible.builtin.import_tasks: hardening.yml

# Card #40 — AppRole + policies + admin AppRole. Runs only on the
# bootstrap host; reads/writes go through Raft and replicate to
# followers. Gated internally on _openbao_token availability so the
# drift cycle no-ops cleanly before the operator provisions creds.
- name: Provision approle auth + policies + AppRoles
  ansible.builtin.import_tasks: approle.yml
  when: inventory_hostname == openbao_bootstrap_host
  tags:
    - openbao_auth

# Card #11 — ufw on each srvvaultN. Rules inserted unconditionally;
# ufw `state: enabled` is gated on openbao_ufw_enable (default false).
- name: Configure ufw
  ansible.builtin.import_tasks: ufw.yml
  tags:
    - openbao_ufw
