---
- name: Reload systemd
  # Picks up drop-ins under /etc/systemd/system/openbao.service.d/.
  # Notified before Restart openbao so the daemon-reload runs first.
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart openbao
  ansible.builtin.systemd:
    name: openbao
    state: restarted

- name: Reload openbao
  # Listener TLS cert reissue: SIGHUP reloads the listener cert without
  # dropping the Raft connection (openbao reloads on SIGHUP per docs).
  ansible.builtin.systemd:
    name: openbao
    state: reloaded
