---
- name: Restart openbao
  ansible.builtin.systemd:
    name: openbao
    state: restarted

- name: Reload openbao
  # Listener TLS cert reissue: SIGHUP reloads the listener cert without
  # dropping the Raft connection (openbao reloads on SIGHUP per docs).
  ansible.builtin.systemd:
    name: openbao
    state: reloaded
