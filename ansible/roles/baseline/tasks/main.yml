---
- name: Set timezone
  community.general.timezone:
    name: "{{ baseline_timezone }}"

# Order matters: this lands before any apt operation in the role so
# baseline's own installs (qemu-guest-agent, baseline_extra_packages)
# already honor the rule on the very first run, not just on the next.
- name: Configure apt to skip Recommends/Suggests on this host class
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/99-no-recommends
    content: |
      # Managed by Ansible (baseline role; see baseline_install_recommends).
      # Suppresses the install of Recommends and Suggests packages on this
      # host so the OS surface stays minimal — applied to k8s and Ceph
      # nodes via playbooks/group_vars/{k8s,ceph}.yml.
      APT::Install-Recommends "false";
      APT::Install-Suggests "false";
    owner: root
    group: root
    mode: "0644"
  when: not baseline_install_recommends

- name: Remove the no-recommends override when the host class allows Recommends
  ansible.builtin.file:
    path: /etc/apt/apt.conf.d/99-no-recommends
    state: absent
  when: baseline_install_recommends

# Proxmox derives the NoCloud instance-id from sha1(user-data + network-data),
# so any reserialization — a guest cloud-init version bump (25.x → 26.x has
# done it), a DNS/searchdomain tweak, a re-set ci field — makes the next boot
# look like a new instance and re-runs the per-instance modules. cc_ssh then
# deletes and regenerates the host keys; ssh_deletekeys defaults true, and the
# deletion takes ssh_host_ed25519_key-cert.pub with it. The key is rewritten
# identical (Terraform-pinned) but the step-ca host certificate is gone, so the
# committed @cert-authority trust can no longer vouch for the host and it goes
# UNREACHABLE mid-roll. Pinning ssh_deletekeys=false here keeps an instance-id
# churn from clobbering the cert. Delivered guest-side via Ansible rather than
# the cloud-init snippet because the snippet only reaches a VM on rebuild
# (terraform pins lifecycle.ignore_changes = [initialization]).
#
# Gated on the drop-in dir existing: baseline also runs on the bare-metal
# PVE hypervisors, which have no cloud-init (and no /etc/cloud), so the
# drop-in is both meaningless and impossible there.
- name: Detect whether cloud-init manages this host
  ansible.builtin.stat:
    path: /etc/cloud/cloud.cfg.d
  register: _baseline_cloud_init_dir

- name: Keep cloud-init from deleting host keys on re-provision
  ansible.builtin.copy:
    dest: /etc/cloud/cloud.cfg.d/99-homelab-ssh.cfg
    content: |
      # Managed by Ansible (baseline role). See tasks/main.yml for the why:
      # protects the step-ca host certificate from cloud-init host-key
      # regeneration when Proxmox's config-hash instance-id churns.
      ssh_deletekeys: false
    owner: root
    group: root
    mode: "0644"
  when: _baseline_cloud_init_dir.stat.exists

# Tagged `os_update` so the scheduled drift pipeline can skip them:
# pending upstream packages are patch posture, not infrastructure drift.
# Revisit once a real cluster-wide update path supersedes the
# baseline_apt_dist_upgrade stop-gap (see decisions.md "OS updates").
- name: Refresh apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  tags: [os_update]

- name: Perform apt dist-upgrade
  ansible.builtin.apt:
    upgrade: dist
  environment:
    NEEDRESTART_MODE: a
  when: baseline_apt_dist_upgrade | bool
  tags: [os_update]

- name: Apt autoremove
  # Each kernel bump leaves behind a linux-headers-* tree; left alone
  # they accumulate one set per release and eventually exhaust /boot
  # inodes. Run unconditionally — autoremove is a no-op when nothing
  # is orphaned.
  ansible.builtin.apt:
    autoremove: true
  environment:
    NEEDRESTART_MODE: a
  when: baseline_apt_dist_upgrade | bool
  tags: [os_update]

- name: Install baseline packages
  ansible.builtin.apt:
    name:
      - qemu-guest-agent
    state: present
  environment:
    NEEDRESTART_MODE: a
  # The guest agent only makes sense inside a VM; PVE hosts are 'host',
  # bare metal is 'NA'.
  when: ansible_facts['virtualization_role'] == 'guest'

# Host-level metrics for the in-cluster Prometheus. Installed on most
# managed hosts; k8s nodes opt out (baseline_node_exporter: false in
# playbooks/group_vars/k8s.yml) — they already run node_exporter as an
# in-cluster DaemonSet pod bound to :9100, so the Debian package's
# systemd unit collides on the port and never starts. When opted out
# the package is purged (config and all) instead of installed.
- name: Manage the prometheus-node-exporter package
  ansible.builtin.apt:
    name: prometheus-node-exporter
    state: "{{ 'present' if baseline_node_exporter else 'absent' }}"
    purge: true
  environment:
    NEEDRESTART_MODE: a

- name: Enable prometheus-node-exporter
  ansible.builtin.systemd:
    name: prometheus-node-exporter
    enabled: true
    state: started
  when: baseline_node_exporter

- name: Validate baseline_os_update_class
  ansible.builtin.assert:
    that:
      - baseline_os_update_class in ['cluster', 'standalone']
    fail_msg: "baseline_os_update_class must be 'cluster' or 'standalone'; got '{{ baseline_os_update_class }}'."

# Cluster-class hosts (k8s, ceph): Ansible owns OS updates via the
# update.yml playbook. Purge unattended-upgrades so there's a single,
# observable update mechanism — no silent fallback to Ubuntu's defaults
# if our config file is removed. See decisions.md "OS updates".
- name: Purge unattended-upgrades (cluster class)
  ansible.builtin.apt:
    name: unattended-upgrades
    state: absent
    purge: true
  when: baseline_os_update_class == 'cluster'

# Standalone-class hosts (srviac today, future OpenBao hosts):
# unattended-upgrades handles security updates and reboots in a quiet
# window. Cluster hosts cannot reboot themselves without drain
# coordination; standalone hosts can.
- name: Install unattended-upgrades (standalone class)
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
  environment:
    NEEDRESTART_MODE: a
  when: baseline_os_update_class == 'standalone'

- name: Configure unattended-upgrades auto-reboot (standalone class)
  ansible.builtin.template:
    src: unattended-upgrades-iac.conf.j2
    dest: /etc/apt/apt.conf.d/99-unattended-upgrades-iac
    owner: root
    group: root
    mode: "0644"
  when: baseline_os_update_class == 'standalone'

- name: Remove our unattended-upgrades drop-in when class is not standalone
  ansible.builtin.file:
    path: /etc/apt/apt.conf.d/99-unattended-upgrades-iac
    state: absent
  when: baseline_os_update_class != 'standalone'

- name: Install per-host extra packages
  ansible.builtin.apt:
    name: "{{ baseline_extra_packages }}"
    state: present
  environment:
    NEEDRESTART_MODE: a
  when: baseline_extra_packages | length > 0

- name: Enable qemu-guest-agent
  ansible.builtin.systemd:
    name: qemu-guest-agent
    enabled: true
    state: started
  when: ansible_facts['virtualization_role'] == 'guest'

# Swap file (opt-in via baseline_swap_size; "0" disables). srvk8sdev runs
# the only one — a relief valve for the single-node microceph + microk8s
# box that was starved into a dev-ceph OSD beacon-loss dropout. Safe
# because that node's kubelet already runs --fail-swap-on=false. Kept on
# the root filesystem, never zpool1: swap on ZFS deadlocks under pressure.
- name: Manage the swap file
  when: baseline_swap_size not in ['0', 0, '']
  block:
    - name: Create the swap file
      community.general.filesize:
        path: "{{ baseline_swap_path }}"
        size: "{{ baseline_swap_size }}"
        # A swap file must be fully allocated — no sparse holes.
        sparse: false

    - name: Secure the swap file
      ansible.builtin.file:
        path: "{{ baseline_swap_path }}"
        owner: root
        group: root
        mode: "0600"

    - name: Probe the swap file for an existing swap signature
      ansible.builtin.command:
        cmd: "blkid -p -s TYPE -o value {{ baseline_swap_path }}"
      register: _baseline_swap_type
      changed_when: false
      failed_when: false
      check_mode: false

    - name: Initialise the swap area
      # mkswap only when the file is not already a swap area — running it
      # on a live signature rewrites the UUID out from under fstab.
      ansible.builtin.command:
        cmd: "mkswap {{ baseline_swap_path }}"
      when: _baseline_swap_type.stdout | trim != 'swap'
      changed_when: true

    - name: Read active swap areas
      ansible.builtin.command:
        cmd: swapon --noheadings --show=NAME
      register: _baseline_active_swap
      changed_when: false
      check_mode: false

    - name: Enable the swap file
      ansible.builtin.command:
        cmd: "swapon {{ baseline_swap_path }}"
      when: baseline_swap_path not in _baseline_active_swap.stdout_lines
      changed_when: true

    - name: Persist the swap file in fstab
      ansible.posix.mount:
        path: none
        src: "{{ baseline_swap_path }}"
        fstype: swap
        opts: sw
        dump: "0"
        passno: "0"
        state: present

- name: Locate noisy motd scripts
  ansible.builtin.find:
    paths: /etc/update-motd.d
    patterns: "{{ baseline_disabled_motd_scripts }}"
    file_type: file
  register: baseline_motd_found

- name: Disable noisy motd scripts
  ansible.builtin.file:
    path: "{{ item.path }}"
    mode: "0644"
  loop: "{{ baseline_motd_found.files }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: Install /root/.vimrc
  ansible.builtin.copy:
    src: vimrc
    dest: /root/.vimrc
    owner: root
    group: root
    mode: "0644"

- name: Install pvginkel .vimrc
  ansible.builtin.copy:
    src: vimrc
    dest: /home/pvginkel/.vimrc
    owner: pvginkel
    group: pvginkel
    mode: "0644"

# Node-local /etc/hosts pins (k8s nodes for `registry`/`ca.home`,
# openbao service VMs for `ca.home`). Managed as a single marked
# block; state=absent when the list is empty so the markers don't
# linger on hosts that opt out.
- name: Manage baseline-owned /etc/hosts entries
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE baseline"
    block: "{{ baseline_etc_hosts_entries | join('\n') }}"
    state: "{{ 'present' if baseline_etc_hosts_entries | length > 0 else 'absent' }}"

# Homelab step-ca root cert — every managed host trusts step-ca-issued
# internal TLS leaves once this lands. The cert file is also the
# artefact the step-ca-bootstrap runbook reads for CA rotation and
# verification.
- name: Install the homelab CA root certificate
  ansible.builtin.copy:
    src: homelab-root.crt
    dest: /usr/local/share/ca-certificates/homelab-root.crt
    owner: root
    group: root
    mode: "0644"
  # Tagged so the homelab root can be distributed on its own — e.g. to
  # k8s nodes that need it for the internal_tls consumer but predate
  # this task (site.yml excludes k8s from baseline). The refresh task
  # below runs under the same tag.
  tags: [ca_trust]

# Netplan's systemd-generator (`/lib/systemd/system-generators/netplan`)
# writes /run/systemd/system/systemd-networkd-wait-online.service.d/
# 10-netplan.conf at every boot, with `-i <ifname>` clauses computed
# from the netplan's view of each link's predictable name (e.g.
# `enp6s18` from the PCI path). udev's NamePolicy can resolve to a
# different name (the kernel-assigned `eth0` via the `keep` step in
# 99-default.link), and on hosts where udev does NOT add the
# predictable name as an altname, wait-online's `-i` clause matches
# nothing and the unit hangs the full 120s timeout on every boot.
# Surfaced on srvvault1 (single NIC, no altname registered);
# multi-NIC hosts like srvk8s1 escaped because `--any` matched their
# real eth0 even with stale entries in the list. Override with a
# higher-lex drop-in in /etc that resets ExecStart and re-emits the
# wait-online invocation without per-interface flags — `--any -o
# routable` already meant "any of these counts" and the broader
# "any managed link counts" preserves that intent.
- name: Ensure the systemd-networkd-wait-online drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/systemd-networkd-wait-online.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Override netplan's systemd-networkd-wait-online drop-in
  ansible.builtin.copy:
    dest: /etc/systemd/system/systemd-networkd-wait-online.service.d/20-baseline.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible — roles/baseline.
      # Overrides the per-boot netplan drop-in at
      # /run/systemd/system/systemd-networkd-wait-online.service.d/10-netplan.conf
      # which can hold stale interface names that no longer resolve.
      [Service]
      ExecStart=
      ExecStart=/lib/systemd/systemd-networkd-wait-online --any -o routable
  notify: Reload systemd

- name: Check the homelab root is registered in the system CA trust bundle
  # Self-heal: Debian's ca-certificates package rebuilds
  # /etc/ssl/certs/ca-certificates.crt on its own triggers (apt upgrades,
  # openssl post-install hooks), and the rebuild walks
  # /etc/ca-certificates.conf rather than /usr/local/share/ca-certificates,
  # so a previously-installed homelab root can quietly disappear from the
  # bundle. Detect that by grepping the cert body (sans PEM markers, which
  # appear in every cert) against the bundle.
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail;
      grep -qFf <(sed '/^-----/d' /usr/local/share/ca-certificates/homelab-root.crt)
      /etc/ssl/certs/ca-certificates.crt
    executable: /bin/bash
  register: _baseline_ca_present
  changed_when: false
  failed_when: false
  check_mode: false
  tags: [ca_trust]

- name: Rebuild the system CA trust bundle when the homelab root is missing
  # update-ca-certificates without -f respects an mtime heuristic and may
  # skip re-processing even when the bundle is stale, so force a full
  # rebuild on the drift path.
  ansible.builtin.command:
    cmd: update-ca-certificates -f
  when: _baseline_ca_present.rc != 0
  changed_when: true
  tags: [ca_trust]

# Re-asserts the netplan render that cloud-init writes on first boot
# (terraform/prd/cloud-init.yaml.tftpl) from the `network_devices`
# host_var — the single source of truth Terraform also reads. Gated on
# a NIC declaring static addresses, matching the cloud-init template's
# own `has_static_nic` check; all-DHCP hosts keep cloud-init's
# auto-generated netplan. Closes the "static netplan is the gap" caveat
# in decisions.md "Cloud-init is a first-boot artefact".
- name: Render /etc/netplan/50-cloud-init.yaml from network_devices
  ansible.builtin.template:
    src: static-netplan.yaml.j2
    dest: /etc/netplan/50-cloud-init.yaml
    owner: root
    group: root
    mode: "0600"
  notify: Apply netplan
  when: >-
    network_devices | default([])
    | selectattr('addresses', 'defined') | selectattr('addresses')
    | list | length > 0
  tags: [netplan]

# Paired with the public-DNS render above: a host whose network_devices
# declare explicit nameservers gets a systemd-resolved drop-in that
# routes *.home queries to the in-cluster dnsmasq LBs. `~home` is a
# routing domain (tilde-prefixed), not a search domain — no bare-name
# expansion. Link DNS (8.8.8.8/4.4) stays the default route; this is a
# side channel. See slices/completed/home-dns-routing.md.
- name: Ensure /etc/systemd/resolved.conf.d exists
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: >-
    network_devices | default([])
    | selectattr('nameservers', 'defined') | selectattr('nameservers')
    | list | length > 0

- name: Render the systemd-resolved .home routing drop-in
  ansible.builtin.template:
    src: home-routing.conf.j2
    dest: /etc/systemd/resolved.conf.d/home-routing.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart systemd-resolved
  when: >-
    network_devices | default([])
    | selectattr('nameservers', 'defined') | selectattr('nameservers')
    | list | length > 0

- name: Remove the systemd-resolved .home routing drop-in when not on public DNS
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d/home-routing.conf
    state: absent
  notify: Restart systemd-resolved
  when: >-
    network_devices | default([])
    | selectattr('nameservers', 'defined') | selectattr('nameservers')
    | list | length == 0
