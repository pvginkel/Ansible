---
# Resolve the OSD disk from its PVE scsi slot the same way
# managed_filesystems does — virtio-scsi-single lands scsiN at HCTL
# N:0:0:N, the older single-controller form at 0:0:N:0; match either.
- name: List top-level disks with HCTL
  ansible.builtin.command:
    argv: [lsblk, -dno, "NAME,HCTL,TYPE", --json]
  register: _microceph_lsblk_disks
  changed_when: false
  check_mode: false

- name: "Resolve guest OSD disk via HCTL for scsi{{ microceph_osd_scsi_index }}"
  vars:
    _idx: "{{ microceph_osd_scsi_index | string }}"
  ansible.builtin.set_fact:
    _microceph_osd_disk: >-
      {{
        (_microceph_lsblk_disks.stdout | from_json).blockdevices
        | selectattr('type', 'equalto', 'disk')
        | selectattr('hctl', 'match', '^[0-9]+:[0-9]+:(' ~ _idx ~ ':0|0:' ~ _idx ~ ')$')
        | map(attribute='name')
        | list | first | default('')
      }}

- name: Assert the OSD disk resolved
  ansible.builtin.assert:
    that:
      - _microceph_osd_disk | length > 0
    fail_msg: >-
      No SCSI disk with HCTL index {{ microceph_osd_scsi_index }} found on the
      guest. qm config for this VM must declare scsi{{ microceph_osd_scsi_index }}
      as the raw OSD disk, and it must NOT appear in managed_filesystems_volumes.

# Idempotency: ask microceph what it already backs. microceph writes
# BlueStore straight onto the raw device (no partition table, no lsblk
# children), so partition inspection can't tell a fresh disk from a live
# OSD. `microceph disk list` records each OSD by its /dev/disk/by-id
# path and has no JSON output, so parse the paths out and resolve each to
# its kernel device to compare against the HCTL-resolved disk.
- name: List microceph-configured disks
  ansible.builtin.command: microceph disk list
  register: _microceph_disk_list
  changed_when: false
  check_mode: false

- name: Extract configured disk paths
  ansible.builtin.set_fact:
    _microceph_configured_paths: "{{ _microceph_disk_list.stdout | regex_findall('(/dev/\\S+)') }}"

- name: Resolve configured disk paths to kernel devices
  ansible.builtin.command:
    argv: [readlink, -f, "{{ item }}"]
  loop: "{{ _microceph_configured_paths }}"
  register: _microceph_configured_real
  changed_when: false
  check_mode: false

- name: Determine whether the OSD disk is already configured
  ansible.builtin.set_fact:
    _microceph_osd_already: >-
      {{ ('/dev/' ~ _microceph_osd_disk)
         in (_microceph_configured_real.results | map(attribute='stdout') | map('trim') | list) }}

- name: "Add OSD on /dev/{{ _microceph_osd_disk }}"
  ansible.builtin.command:
    argv: "{{ ['microceph', 'disk', 'add', '/dev/' ~ _microceph_osd_disk] + (['--wipe'] if microceph_osd_wipe | bool else []) }}"
  when: not _microceph_osd_already | bool
  register: _microceph_disk_add
  # Belt-and-suspenders: if the guard ever misses, microceph's own
  # "already exists" refusal is treated as a no-op rather than a failure.
  changed_when: _microceph_disk_add.rc == 0
  failed_when:
    - _microceph_disk_add.rc != 0
    - "'already exists' not in _microceph_disk_add.stderr"
