---
# microk8s release channel. Pinned per cluster in group_vars (k8s_prd.yml etc.).
# 1.32/stable is the LTS-tracked default per /work/AnsibleSpecs/decisions.md "k8s version policy."
microk8s_channel: 1.32/stable

# Calico autodetection: which interface carries pod traffic. Defaults to
# whatever NIC Ansible finds on the default-route path — `eth0` on
# cloud-init'd VMs, `ens18` on the manually-installed live prod nodes,
# `eth0` on prod once those are rebuilt via cloud-init. Override
# per-cluster only if pod traffic should ride a non-default-route NIC
# (e.g. vmbr1 on prod once that backplane is verified — see
# decisions.md "Network topology"). Patched into
# /var/snap/microk8s/current/args/cni-network/cni.yaml.
microk8s_calico_iface: "{{ ansible_facts['default_ipv4'].interface }}"

# Cluster CIDRs. Empty defaults force every cluster to set them in
# group_vars — microk8s's compiled-in defaults (10.1.0.0/16) collide with
# the homelab LAN. The role asserts non-empty before installing.
microk8s_cluster_cidr_v4: ""
microk8s_service_cidr_v4: ""
microk8s_cluster_cidr_v6: ""
microk8s_service_cidr_v6: ""

# Extra SubjectAltNames added to the API server cert. Conventionally
# includes the service-CIDR gateway IP so clients addressing the API
# through the service network can verify TLS.
microk8s_extra_sans: []

# Addons enabled on every node the role runs against. Bare names only;
# microk8s install quirks that need positional args (today: metallb's
# IP-range prompt) are handled inline in tasks/addons.yml so inventory
# stays clean. Order matters in microk8s — `community` must precede
# community-namespaced addons.
microk8s_addons:
  - dns
  - helm
  - helm3
  - metrics-server

# OS users added to the `microk8s` group. Members can run kubectl/helm via
# the snap alias without sudo. Empty = no users added.
microk8s_users: []

# Hostname of the cluster's primary node — the one from which addons,
# capability labels, the MetalLB pool spec, and the CoreDNS Corefile
# are reconciled, and the one the join token is requested from. Set
# to "" by default and OVERWRITTEN AT RUNTIME by the role's
# elect-primary.yml task list per the rules documented there. Don't
# pin it in inventory — the whole point of election is that a
# rebuilt labeled-primary stops being load-bearing.
microk8s_primary_host: ""

# MetalLB IPAddressPool + L2Advertisement reconciled by the role on the
# primary. Empty addresses list skips the task. The `metallb` addon
# must also be in microk8s_addons for the controller to be installed.
# Pool/advertisement names default to what the addon creates
# (`default-addresspool`, `default-advertise-all-pools`) so the role
# upserts in place — the sentinel range the addon was enabled with
# (see tasks/addons.yml) is overwritten the first time this runs.
microk8s_metallb_namespace: metallb-system
microk8s_metallb_pool_name: default-addresspool
microk8s_metallb_advertisement_name: default-advertise-all-pools
microk8s_metallb_pool_addresses: []

# Kernel modules required by microk8s and the Ceph CSI clients. Loaded via
# /etc/modules-load.d/ so they survive reboots.
microk8s_kernel_modules:
  - nf_conntrack
  - ceph
  - rbd
  - nbd

# Packages required for the Ceph CSI client side. The k8s nodes mount
# RBD/CephFS volumes from the Ceph cluster but are not Ceph mons/osds
# themselves.
microk8s_ceph_client_packages:
  - ceph-common
  - rbd-nbd

# Containerd registry mirrors. Each entry is a `<host>:<port>` string
# matching the image-reference prefix; the role renders
# /var/snap/microk8s/current/args/certs.d/<entry>/hosts.toml pointing
# at `http://<entry>` with pull+resolve capabilities. Empty = no
# mirrors managed; operator-added entries (e.g. localhost:32000 from
# the microk8s registry addon) are left alone either way.
microk8s_registry_mirrors: []

# /etc/hosts entries owned by the role. Each list item is a full line
# (`<ip> <name1> [name2 ...]`). Managed as a single marked block;
# empty list removes the block entirely.
microk8s_etc_hosts_entries: []

# CoreDNS hosts overrides. Reconciled on the cluster primary into the
# kube-system/coredns ConfigMap. Each entry is `{ip, names}`. Empty =
# no hosts block in the rendered Corefile.
microk8s_coredns_hosts: []

# CoreDNS A-record templates. Each entry is `{domain, answer_a, ttl}`.
# Renders a `template IN A <domain>` block that answers any subdomain
# of <domain> with <answer_a>. Used to point public hostnames at an
# in-cluster ingress LB so in-cluster traffic doesn't loop out and back.
microk8s_coredns_templates: []
