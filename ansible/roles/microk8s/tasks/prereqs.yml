---
- name: Drop /etc/modules-load.d/<module>.conf for each kernel module
  ansible.builtin.copy:
    dest: "/etc/modules-load.d/{{ item }}.conf"
    content: "{{ item }}\n"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ microk8s_kernel_modules }}"

- name: Load kernel modules now (boot-time loading is the modules-load.d job)
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ microk8s_kernel_modules }}"

- name: Install Ceph client packages
  ansible.builtin.apt:
    name: "{{ microk8s_ceph_client_packages }}"
    state: present
  environment:
    NEEDRESTART_MODE: a

- name: Install python3-kubernetes (primary only — used by kubernetes.core.k8s)
  # The labels and (Phase 4a) MetalLB reconciliation tasks run on the
  # primary via kubernetes.core.k8s, which needs the `kubernetes`
  # Python library on the host that executes the module. Secondaries
  # never call kubernetes.core.k8s, so we install only where it's used.
  ansible.builtin.apt:
    name: python3-kubernetes
    state: present
  when: inventory_hostname == microk8s_primary_host
  environment:
    NEEDRESTART_MODE: a
