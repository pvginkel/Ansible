---
- name: Drop /etc/modules-load.d/<module>.conf for each kernel module
  ansible.builtin.copy:
    dest: "/etc/modules-load.d/{{ item }}.conf"
    content: "{{ item }}\n"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ microk8s_kernel_modules }}"

- name: Load kernel modules now (boot-time loading is the modules-load.d job)
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ microk8s_kernel_modules }}"

- name: Install Ceph client packages
  ansible.builtin.apt:
    name: "{{ microk8s_ceph_client_packages }}"
    state: present
  environment:
    NEEDRESTART_MODE: a

- name: Install python3-kubernetes
  # The cluster-scoped tasks (labels, MetalLB, CoreDNS) run via
  # kubernetes.core.k8s on whichever node is elected primary. With
  # dynamic election any node may become primary at any time, so
  # every k8s node carries the library — gating on the elected
  # primary at install time would leave a freshly-rebuilt node
  # uninstrumented until the next role apply re-elects it.
  ansible.builtin.apt:
    name: python3-kubernetes
    state: present
  environment:
    NEEDRESTART_MODE: a
