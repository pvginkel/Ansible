---
- name: Add users to the microk8s group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: microk8s
    append: true
  loop: "{{ microk8s_users }}"

- name: Ensure ~/.kube exists per microk8s user
  ansible.builtin.file:
    path: "/home/{{ item }}/.kube"
    state: directory
    owner: "{{ item }}"
    group: "{{ item }}"
    mode: "0700"
  loop: "{{ microk8s_users }}"

- name: Check whether kubectl is already aliased
  ansible.builtin.stat:
    path: /snap/bin/kubectl
  register: microk8s_kubectl_alias

- name: Alias microk8s.kubectl as kubectl
  # `microk8s join` (and other join-time snap operations) leave a brief
  # service-control change in flight; snap rejects parallel operations
  # against the same snap with rc=10. Retry until snap has settled.
  ansible.builtin.command: snap alias microk8s.kubectl kubectl
  when: not microk8s_kubectl_alias.stat.exists
  register: _microk8s_snap_alias
  retries: 10
  delay: 3
  until: _microk8s_snap_alias is succeeded
