---
- name: Assert cluster CIDRs and primary-host are configured
  ansible.builtin.assert:
    that:
      - microk8s_cluster_cidr_v4 | length > 0
      - microk8s_service_cidr_v4 | length > 0
      - microk8s_cluster_cidr_v6 | length > 0
      - microk8s_service_cidr_v6 | length > 0
      - microk8s_primary_host | length > 0
    fail_msg: "Set microk8s_cluster_cidr_v4/v6, microk8s_service_cidr_v4/v6, and microk8s_primary_host in group_vars/k8s_<cluster>.yml. Defaults are empty so a missing cluster config fails loud rather than installing on the wrong network or trying to join an unset primary."

- name: Apply prerequisites (kernel modules, Ceph client packages)
  ansible.builtin.import_tasks: prereqs.yml

- name: Install microk8s and stage launch config
  ansible.builtin.import_tasks: install.yml

# Tasks past this point read state created by the snap install (cni.yaml,
# the microk8s CLI, the microk8s OS group). Stat the binary so a check-mode
# run on a fresh VM short-circuits the post-install steps cleanly instead
# of failing partway through.
- name: Check whether microk8s is installed
  ansible.builtin.stat:
    path: /snap/bin/microk8s
  register: _microk8s_installed
  check_mode: false

- name: Reconcile containerd registry mirrors (certs.d)
  ansible.builtin.import_tasks: registry-mirrors.yml
  when: _microk8s_installed.stat.exists

- name: Reconcile node-local /etc/hosts entries
  ansible.builtin.import_tasks: etc-hosts.yml
  when: _microk8s_installed.stat.exists

- name: Configure cluster network (Calico autodetect)
  ansible.builtin.import_tasks: network.yml
  when: _microk8s_installed.stat.exists

# Non-primary nodes join the primary's cluster. The primary itself
# bootstraps via install.yml's solo cluster — no join-of-self.
- name: Join the cluster (non-primary nodes only)
  ansible.builtin.import_tasks: join.yml
  when:
    - _microk8s_installed.stat.exists
    - inventory_hostname != microk8s_primary_host

# Cluster-scoped state — addons, capability labels, and the MetalLB
# pool spec — reconcile only on the primary. Per-node state above
# applies everywhere.
- name: Enable addons (primary only)
  ansible.builtin.import_tasks: addons.yml
  when:
    - _microk8s_installed.stat.exists
    - inventory_hostname == microk8s_primary_host

- name: Reconcile capability labels (primary only)
  ansible.builtin.import_tasks: labels.yml
  when:
    - _microk8s_installed.stat.exists
    - inventory_hostname == microk8s_primary_host

- name: Reconcile MetalLB IPAddressPool + L2Advertisement (primary only)
  ansible.builtin.import_tasks: metallb.yml
  when:
    - _microk8s_installed.stat.exists
    - inventory_hostname == microk8s_primary_host

# CoreDNS reconciliation runs on the primary after `addons.yml` has
# enabled the `dns` addon (which is what creates the coredns
# ConfigMap in the first place).
- name: Reconcile CoreDNS Corefile (primary only)
  ansible.builtin.import_tasks: coredns.yml
  when:
    - _microk8s_installed.stat.exists
    - inventory_hostname == microk8s_primary_host

- name: Add users to microk8s group + alias kubectl
  ansible.builtin.import_tasks: users.yml
  when: _microk8s_installed.stat.exists
