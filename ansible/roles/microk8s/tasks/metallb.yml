---
# MetalLB IPAddressPool + L2Advertisement reconciliation. The microk8s
# `metallb` addon installs the controller and creates a default pool +
# advertisement from its colon-arg; this task upserts those same
# resources by name, so the addon's range is overwritten the moment
# the reconcile runs and the role becomes the single source of truth.
# Empty addresses → both tasks skip.

# `validate_certs: false` on every kubernetes.core call below: the
# microk8s self-signed CA omits the KeyUsage extension, which Python
# 3.13 (resolute / 26.04) rejects per RFC 5280. The kubeconfig
# authenticates via client cert against the apiserver at 127.0.0.1 —
# verifying the loopback server cert adds no security here, so disable
# the check. Same rationale applies in labels.yml and coredns.yml.

- name: Wait for the MetalLB validating webhook to accept connections
  # The IPAddressPool / L2Advertisement reconciles below go through
  # metallb's `ipaddresspoolvalidationwebhook.metallb.io` and
  # `l2advertisementvalidationwebhook.metallb.io`. The microk8s
  # `metallb` addon enable in addons.yml returns the moment kubectl
  # apply finishes — the controller Deployment (which serves the
  # webhook) is still rolling. Without this gate the first reconcile
  # on a fresh rebuild races and fails with 500 connection refused.
  # Poll the Endpoints of metallb-webhook-service until at least one
  # subset reports a Ready address.
  kubernetes.core.k8s_info:
    kubeconfig: /var/snap/microk8s/current/credentials/client.config
    validate_certs: false
    api_version: v1
    kind: Endpoints
    namespace: "{{ microk8s_metallb_namespace }}"
    name: metallb-webhook-service
  register: _microk8s_metallb_webhook_endpoints
  until: >-
    (_microk8s_metallb_webhook_endpoints.resources | length > 0)
    and ((_microk8s_metallb_webhook_endpoints.resources[0].subsets | default([])) | length > 0)
  retries: 60
  delay: 2
  changed_when: false
  check_mode: false
  when: microk8s_metallb_pool_addresses | length > 0

- name: Reconcile MetalLB IPAddressPool ({{ microk8s_metallb_pool_name }})
  kubernetes.core.k8s:
    state: present
    kubeconfig: /var/snap/microk8s/current/credentials/client.config
    validate_certs: false
    definition:
      apiVersion: metallb.io/v1beta1
      kind: IPAddressPool
      metadata:
        name: "{{ microk8s_metallb_pool_name }}"
        namespace: "{{ microk8s_metallb_namespace }}"
      spec:
        addresses: "{{ microk8s_metallb_pool_addresses }}"
  when: microk8s_metallb_pool_addresses | length > 0

- name: Reconcile MetalLB L2Advertisement ({{ microk8s_metallb_advertisement_name }})
  kubernetes.core.k8s:
    state: present
    kubeconfig: /var/snap/microk8s/current/credentials/client.config
    validate_certs: false
    definition:
      apiVersion: metallb.io/v1beta1
      kind: L2Advertisement
      metadata:
        name: "{{ microk8s_metallb_advertisement_name }}"
        namespace: "{{ microk8s_metallb_namespace }}"
      spec:
        ipAddressPools:
          - "{{ microk8s_metallb_pool_name }}"
  when: microk8s_metallb_pool_addresses | length > 0
