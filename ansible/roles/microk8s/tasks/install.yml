---
- name: Ensure /var/snap/microk8s/common exists
  ansible.builtin.file:
    path: /var/snap/microk8s/common
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Stage microk8s launch config (CIDRs + extraSANs)
  ansible.builtin.template:
    src: launch-config.yaml.j2
    dest: /var/snap/microk8s/common/.microk8s.yaml
    owner: root
    group: root
    mode: "0600"

# `community.general.snap` runs `snap info microk8s` to resolve the
# canonical name and parses the output for a `name:` line. On a freshly-
# booted VM that line is missing until snapd's first-boot seed
# completes, and the module's `process_one` raises `IndexError` on the
# empty list rather than reporting a useful error. Bound the seed-warmup
# window before invoking the module. Idempotent — returns instantly
# once seeded.
- name: Wait for snapd to finish seeding
  ansible.builtin.command: snap wait system seed.loaded
  changed_when: false

- name: Install microk8s snap (channel = {{ microk8s_channel }})
  community.general.snap:
    name: microk8s
    classic: true
    channel: "{{ microk8s_channel }}"
    state: present

# Two-phase wait: the API server may be live before kubelet has
# registered the node, so the existence poll covers the registration
# gap; the condition wait then blocks on KubeletReady. `kubectl wait
# --for=condition=Ready` is independent of `SchedulingDisabled`, so
# this also passes on a cordoned single-node cluster (the case the
# `microk8s status --wait-ready` substring match fails on — see
# rebuild-k8s.yml's matching task for the bug write-up).
- name: Wait for {{ inventory_hostname }} to register with the API
  ansible.builtin.command:
    argv: [microk8s, kubectl, get, "node/{{ inventory_hostname }}"]
  register: _node_get
  until: _node_get.rc == 0
  retries: 60
  delay: 2
  changed_when: false

- name: Wait for {{ inventory_hostname }} to report Ready
  ansible.builtin.command:
    argv:
      - microk8s
      - kubectl
      - wait
      - --for=condition=Ready
      - "node/{{ inventory_hostname }}"
      - --timeout=120s
  changed_when: false
