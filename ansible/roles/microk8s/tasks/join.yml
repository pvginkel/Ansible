---
# Idempotency: "is this node already a cluster member?"
#
# Control-plane nodes read it off `high-availability.nodes` — the dqlite
# member list, which is 1 (self at 127.0.0.1) on the post-install solo
# cluster and >1 once joined.
#
# Worker nodes run no dqlite, so that field is not a reliable signal on
# them. They instead count Nodes via `microk8s kubectl`: a solo pre-join
# node sees only itself, a joined worker sees the whole cluster through
# its apiserver proxy. install.yml has already waited for the node to
# register and report Ready by the time this runs, so kubectl is usable.
- name: Read this node's microk8s status (control-plane join idempotency)
  ansible.builtin.command: microk8s status --format yaml
  register: _microk8s_self_status
  changed_when: false
  # Read-only — run in check mode too, so the membership decision below
  # reflects reality instead of reporting an already-joined node as
  # unjoined off empty stdout. (The join chain is also guarded against
  # check mode, so a wrong False no longer crashes — but it would still
  # mis-report intent, and on a worker the probe is less reliable.)
  check_mode: false
  when: not (microk8s_worker_only | bool)

- name: Count cluster Nodes visible from this worker (worker join idempotency)
  ansible.builtin.command:
    argv: [microk8s, kubectl, get, nodes, --output, name]
  register: _microk8s_worker_nodes
  changed_when: false
  check_mode: false
  when: microk8s_worker_only | bool

- name: Decide whether this node has already joined the cluster
  # high-availability.nodes lists every cluster member. The secondary's
  # post-install solo cluster has one entry pinned to 127.0.0.1; once
  # joined the list reports the cluster's real members. Count > 1 means
  # we're in. Defensive parse mirrors addons.yml — a transient blank
  # status doesn't poison the decision.
  ansible.builtin.set_fact:
    _microk8s_joined: >-
      {%- if microk8s_worker_only | bool -%}
      {{ (_microk8s_worker_nodes.stdout_lines | default([])) | length > 1 }}
      {%- else -%}
      {{ ((((_microk8s_self_status.stdout | from_yaml) or {})
            .get('high-availability') or {})
            .get('nodes') or []) | length > 1 }}
      {%- endif -%}

# The join chain (token → join → readiness wait) is a real, irreversible
# mutation and can't be dry-run: add-node mints a token, join is one-way.
# Skip it in check mode and just report intent. This also makes the probe's
# accuracy non-fatal: if it can't confirm membership (e.g. a worker whose
# kubectl momentarily returns no nodes), check mode no longer crashes on the
# skipped token register — it reports the would-be join instead.
- name: Report that a real run would join this node (check mode)
  ansible.builtin.debug:
    msg: >-
      {{ inventory_hostname }} is not detected as a cluster member; a real
      run would request a join token from {{ microk8s_primary_host }} and join.
  when:
    - not _microk8s_joined
    - ansible_check_mode

- name: Request a single-use join token from the primary
  # add-node mints a token with a short TTL — long enough to use once,
  # nowhere near long enough to leak via process lists or logs. The
  # delegate_to runs the command on the primary; the URL it returns is
  # consumed by the next task on this (joining) node.
  ansible.builtin.command: microk8s add-node --format json --token-ttl 60
  delegate_to: "{{ microk8s_primary_host }}"
  register: _microk8s_add_node
  when:
    - not _microk8s_joined
    - not ansible_check_mode
  changed_when: false

- name: Join the cluster
  # `--worker` joins outside the dqlite quorum (no apiserver/datastore);
  # the control-plane join takes the bare URL. The token URL is the same
  # either way — add-node doesn't care what the joiner intends to be.
  ansible.builtin.command: >-
    microk8s join {{ (_microk8s_add_node.stdout | from_json).urls | first }}{{ ' --worker' if (microk8s_worker_only | bool) else '' }}
  when:
    - not _microk8s_joined
    - not ansible_check_mode
  changed_when: true

- name: Wait for microk8s to be Ready post-join (control-plane)
  ansible.builtin.command: microk8s status --wait-ready --timeout 120
  when:
    - not _microk8s_joined
    - not (microk8s_worker_only | bool)
  changed_when: false

- name: Wait for the worker to re-register and report Ready post-join
  # `--worker` restarts the local services (kubelet is reconfigured and
  # the apiserver proxy comes up), so kubectl is briefly unreachable.
  # Poll the node's own Ready condition through the proxy — robust on a
  # worker, where `microk8s status --wait-ready` behaviour is version-
  # dependent — and let `until` ride out the restart gap.
  ansible.builtin.command:
    argv:
      - microk8s
      - kubectl
      - wait
      - --for=condition=Ready
      - "node/{{ inventory_hostname }}"
      - --timeout=120s
  register: _microk8s_worker_ready
  until: _microk8s_worker_ready.rc == 0
  retries: 30
  delay: 4
  when:
    - not _microk8s_joined
    - microk8s_worker_only | bool
  changed_when: false
