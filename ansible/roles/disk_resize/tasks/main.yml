---
- name: Assert vm_id and pve_node are defined
  ansible.builtin.assert:
    that:
      - vm_id is defined
      - pve_node is defined
    fail_msg: >-
      disk_resize requires inventory vars `vm_id` and `pve_node` on the
      target host (the latter defaults to `pve` for VMs in pve_vms).

- name: Read PVE-side qm config for VMID {{ vm_id }}
  ansible.builtin.command:
    argv:
      - qm
      - config
      - "{{ vm_id | string }}"
  register: disk_resize_qm_config
  changed_when: false
  check_mode: false
  delegate_to: "{{ pve_node }}"

- name: Reconcile each declared filesystem
  ansible.builtin.include_tasks: reconcile_one.yml
  loop: "{{ disk_resize_filesystems }}"
  loop_control:
    loop_var: disk_resize_fs
    label: "{{ disk_resize_fs.mountpoint }} ← scsi{{ disk_resize_fs.scsi_index }}"
