---
# apply-k8s-apiserver-cert.yml — roll the homelab-CA kube-apiserver TLS
# leaf onto the running k8s clusters without a rebuild.
#
# The leaf + --tls-sni-cert-key arg are folded into the `microk8s` role
# (tasks/internal_tls.yml) and so land on any node rebuilt via
# rebuild-k8s.yml. This playbook applies just that slice to the
# already-running nodes — issue the leaf, set the arg, restart kubelite.
#
# serial: 1 so one node's control plane restarts at a time, per
# decisions.md "Cluster changes are serialized." On prd the apiserver
# VIP and the two peer nodes cover the ~few-second kubelite blip; the
# single-node dev cluster (wrkdevk8s) has no peer, so expect a brief
# API gap there.
#
# Needs the ansible-vault passphrase — the JWK provisioner password the
# internal_tls role mints against is vaulted. Have it on hand via
# ANSIBLE_VAULT_PASSWORD_FILE (see docs/runbooks/operator-workstation.md)
# or pass --vault-password-file.
#
#   ansible-playbook playbooks/apply-k8s-apiserver-cert.yml --diff

- name: Apply the homelab kube-apiserver TLS leaf to the k8s clusters
  hosts: k8s
  become: true
  gather_facts: true
  serial: 1
  tasks:
    - name: Issue and serve the kube-apiserver homelab TLS leaf
      ansible.builtin.import_role:
        name: microk8s
        tasks_from: internal_tls
