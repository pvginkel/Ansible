---
# recover-dqlite-watch.yml — detect and clear a frozen microk8s apiserver
# watch cache by rolling-restarting k8s-dqlite on any affected node.
#
# The bug: on 1.34–1.35 the k8s-dqlite watch poll loop dies on a transient
# and stays dead until the daemon is restarted (k8s-dqlite#364 /
# microk8s#5386, fix PR #365 unmerged). A dead watch freezes the node's
# apiserver watch cache; controllers reconcile from the stale cache and
# stop creating/scheduling pods, metrics flap, Headlamp slows. Quorum
# reads stay correct, so `kubectl get` looks fine — which is why it hides.
#
# Safe to run anytime: every node is probed first and dqlite is restarted
# ONLY on the unambiguous frozen signature, so a healthy cluster is a clean
# no-op (changed=0). serial: 1 rolls the restart one node at a time, never
# dropping more than one dqlite voter, so quorum holds throughout.
#
# Runs unattended from srviac on a short Jenkins cron
# (Jenkinsfile.iac-dqlite-watchdog). It has NO Kubernetes dependency beyond
# SSH to the nodes, so it still works when the cluster won't schedule new
# pods — the whole point of healing from outside the cluster.
#
#   ansible-playbook playbooks/recover-dqlite-watch.yml
#
# Scope to one cluster or node with --limit.

- name: Recover frozen microk8s watch caches
  hosts: k8s
  become: true
  gather_facts: false
  serial: 1
  tasks:
    - name: Detect and clear a frozen watch cache
      ansible.builtin.import_role:
        name: microk8s
        tasks_from: recover-watch-freeze
