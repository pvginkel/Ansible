---
# Standalone microk8s playbook. Used in Phase 4 steps 2-3 to exercise the
# role on the scratch cluster before it joins site.yml at step 4. Bootstrap
# and baseline still run via site.yml — this playbook *only* applies the
# microk8s role on top of an already-baselined host.
#
# Typical scratch run:
#   poetry run ansible-playbook playbooks/microk8s.yml \
#       -i inventories/scratch --limit scratch --check --diff
#
# Scope-via-inventory: `hosts: k8s` matches whichever k8s_* groups the
# active inventory exposes (k8s_scratch under inventories/scratch;
# k8s_prd + k8s_dev under inventories/prd, once those group_vars exist).
- name: Apply microk8s role
  hosts: k8s
  become: true
  gather_facts: true
  roles:
    - role: microk8s
