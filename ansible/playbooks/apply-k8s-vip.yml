---
# apply-k8s-vip.yml — roll the kube-apiserver Keepalived VIP onto the
# running prd cluster.
#
# The VIP config is folded into the `microk8s` role
# (tasks/keepalived.yml) and so lands on any node rebuilt via
# rebuild-k8s.yml. This playbook applies just that slice to the
# already-running nodes without a rebuild — install keepalived, render
# keepalived.conf, start the service — one node at a time.
#
# serial: 1 so at most one VRRP election is in flight at once, per
# decisions.md "Cluster changes are serialized." Each node's restart
# drops the VIP for ~1-3 s while a peer takes over; the apiserver on
# the other two nodes stays reachable directly throughout.
#
# Requires the ansible-vault passphrase for the shared VRRP secret:
#
#   ansible-playbook playbooks/apply-k8s-vip.yml --ask-vault-pass --diff

- name: Apply the kube-apiserver VIP to the prd k8s cluster
  hosts: k8s_prd
  become: true
  gather_facts: true
  serial: 1
  tasks:
    - name: Configure the kube-apiserver VIP (keepalived)
      ansible.builtin.import_role:
        name: microk8s
        tasks_from: keepalived
