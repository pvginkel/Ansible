---
# evict-k8s.yml — drive the controlled hand-off + drain of one k8s
# node ahead of a Terraform-side rebuild. Operator-driven; pair with
# the rebuild flow in docs/runbooks/k8s-rebuild.md.
#
# Runs against the OLD hostname (the one being rebuilt away from):
#
#   poetry run ansible-playbook playbooks/evict-k8s.yml \
#       -e evict_target=<old-hostname>
#
# Hand-off + drain only — `microk8s leave` and `microk8s remove-node`
# stay as the operator commands they are today. The runbook calls
# them after this playbook reports success.
#
# Per decisions.md "Cluster changes are serialized," never run against
# more than one evict_target at a time.

- name: Evict the eviction target from the cluster
  hosts: "{{ evict_target | mandatory }}"
  become: true
  gather_facts: false
  tasks:
    - name: Compute cluster-peer count
      # Mirrors update-k8s.yml's gate: count hosts in the inventory's
      # `k8s` parent group that share this host's primary. Drives the
      # single-node skip in the imported hand-off and in the drain
      # below.
      ansible.builtin.set_fact:
        _cluster_peer_count: >-
          {{ groups['k8s']
             | map('extract', hostvars)
             | selectattr('microk8s_primary_host', 'eq', microk8s_primary_host)
             | list
             | length }}

    - name: Hand off labeled workloads off the eviction target
      ansible.builtin.import_tasks: tasks/pre-drain-handoff.yml

    - name: Drain the eviction target
      ansible.builtin.command:
        argv:
          - microk8s
          - kubectl
          - drain
          - "{{ evict_target }}"
          - --ignore-daemonsets
          - --delete-emptydir-data
          - --timeout=300s
      delegate_to: "{{ microk8s_primary_host }}"
      when: _cluster_peer_count | int > 1
      changed_when: true
