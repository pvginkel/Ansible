---
# reissue-host-cert.yml — re-issue a managed host's SSH host certificate
# over the pre-certificate bootstrap channel.
#
# Recovery for the deadlock where a host has lost its step-ca host
# certificate but its host key is otherwise intact: sshd falls back to
# the bare ed25519 key, the committed `@cert-authority` line cannot
# vouch for it, the host goes UNREACHABLE — and the very role that would
# re-sign the cert (ssh_host_cert) can no longer connect to run.
#
# The canonical trigger is cloud-init: on a new instance-id it deletes
# and regenerates the host keys (taking `*-cert.pub` with them). The
# Terraform-pinned key is rewritten to the same value, so the bare key
# still matches `terraform output host_pubkeys` — exactly what Play 1
# pins below — only the certificate is gone.
#
# Run per host:
#   ansible-playbook playbooks/reissue-host-cert.yml -e reissue_target=<hostname>
#
# This converges only ssh_host_cert. It assumes the host is otherwise a
# fully-converged managed host (baseline's homelab CA root in the trust
# store, and on k8s nodes the `ca.home` /etc/hosts pin) — which holds
# for a host that lost its cert post-converge. For a brand-new VM use
# rebuild-k8s.yml (full bootstrap), not this.

# Seed a transient known_hosts from `terraform output` — the host key
# Terraform generated and embedded via cloud-init, authoritative and no
# TOFU — for the single pre-certificate connection. Mirrors Play 1 of
# rebuild-k8s.yml. See AnsibleSpecs slices/ssh-host-ca.md.
- name: Seed a transient known_hosts for the cert-less host
  hosts: localhost
  gather_facts: false
  become: false
  vars:
    _tf_workspace: "{{ playbook_dir }}/../../terraform/prd"
    _transient_known_hosts: "{{ playbook_dir }}/../../tmp/reissue-known-hosts"
  tasks:
    # `terraform output` opens the working directory and validates
    # against .terraform/providers, so a fresh checkout / container
    # without a prior init fails the same way `terraform plan` does.
    # init is idempotent and fast when .terraform/ is already warm.
    - name: Ensure the terraform working directory is initialised
      ansible.builtin.command:
        argv:
          - terraform
          - "-chdir={{ _tf_workspace }}"
          - init
          - -input=false
          - -no-color
      changed_when: false
      check_mode: false

    - name: Read from-scratch host public keys from terraform output
      ansible.builtin.command:
        argv:
          - terraform
          - "-chdir={{ _tf_workspace }}"
          - output
          - -json
          - host_pubkeys
      register: _tf_host_pubkeys
      changed_when: false
      check_mode: false

    - name: Require a host key for the reissue target
      ansible.builtin.assert:
        that: reissue_target in (_tf_host_pubkeys.stdout | from_json)
        fail_msg: >-
          terraform output host_pubkeys has no entry for
          {{ reissue_target }} — this playbook only recovers from-scratch
          VMs whose host key Terraform pins.

    - name: Ensure the transient known_hosts directory exists
      ansible.builtin.file:
        path: "{{ _transient_known_hosts | dirname }}"
        state: directory
        mode: "0755"
      check_mode: false

    - name: Write the cert-less host's pinned key to the transient known_hosts
      ansible.builtin.copy:
        dest: "{{ _transient_known_hosts }}"
        content: "{{ reissue_target }},{{ reissue_target }}.home {{ (_tf_host_pubkeys.stdout | from_json)[reissue_target] }}\n"
        mode: "0644"
      check_mode: false

- name: Re-issue the SSH host certificate on the target
  hosts: "{{ reissue_target | mandatory }}"
  become: true
  gather_facts: true
  vars:
    # The target presents a bare host key until ssh_host_cert signs it a
    # certificate. Replace ssh_args wholesale — for repeated `-o` options
    # OpenSSH takes the first value, so an appended common_args cannot
    # override ansible.cfg's UserKnownHostsFile. The transient file
    # (Play 1) carries the bare key; known_hosts.d/homelab carries the
    # `@cert-authority` line OpenSSH falls through to once the cert is
    # live. The rest mirrors ansible.cfg's ssh_args. Mirrors
    # rebuild-k8s.yml's bootstrap_ssh_args.
    ansible_ssh_args: >-
      -o ControlMaster=auto -o ControlPersist=60s
      -o PreferredAuthentications=publickey
      -o "UserKnownHostsFile={{ playbook_dir }}/../../tmp/reissue-known-hosts {{ playbook_dir }}/../files/known_hosts.d/homelab"
      -o GlobalKnownHostsFile=/dev/null
      -o HostKeyAlgorithms=ssh-ed25519-cert-v01@openssh.com,ssh-ed25519
      -o IdentityFile=~/.ssh/id_ed25519_ansible -o IdentitiesOnly=yes
  roles:
    - role: ssh_host_cert
