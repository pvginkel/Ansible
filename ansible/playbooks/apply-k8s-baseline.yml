---
# apply-k8s-baseline.yml — apply the `baseline` role to the running k8s
# clusters in place, without a rebuild.
#
# site.yml excludes k8s + ceph from its baseline play: *drain-requiring*
# role applies on cluster members flow through update-k8s.yml /
# rebuild-k8s.yml. This playbook is the in-place path for the
# *non*-drain part of baseline — config convergence that doesn't move
# pods. Keep os_update (the apt dist-upgrade) out of it: skip that tag
# here and let update-k8s.yml own patch posture.
#
# `baseline` pulls in `bootstrap` via its meta dependency, exactly as
# rebuild-k8s.yml does. serial: 1 per decisions.md "Cluster changes are
# serialized."
#
# Distribute just the homelab CA root cert — the non-disruptive case;
# unblocks the internal_tls / kube-apiserver-cert work on nodes that
# were rebuilt before §C of the internal-tls slice landed:
#
#   ansible-playbook playbooks/apply-k8s-baseline.yml --tags ca_trust --diff
#
# Full non-drain baseline convergence:
#
#   ansible-playbook playbooks/apply-k8s-baseline.yml --skip-tags os_update --diff

- name: Apply baseline to the k8s clusters in place
  hosts: k8s
  become: true
  gather_facts: true
  serial: 1
  roles:
    - role: baseline
