---
# Defaults shared across every k8s cluster (prd, dev, scratch). Lives at
# playbook-level so it applies regardless of which inventory the playbook
# runs against. Per-cluster specifics live in
# inventories/<env>/group_vars/k8s_<cluster>.yml and override anything
# here.

# k8s nodes stay minimal — apt installs skip Recommends/Suggests. Reduces
# package noise to only what the roles explicitly request.
baseline_install_recommends: false

# zfsutils-linux is needed for `zpool import` during rebuild-k8s.yml on
# nodes that carry a passthrough ZFS pool (today: srvk8s1's zpool2).
# Installing on every k8s node is simpler than per-host gating: the
# resource cost on hosts with no pool is small (~25 MB disk,
# steady-state) and any future node that ends up with a passthrough
# pool is already provisioned.
baseline_extra_packages:
  - zfsutils-linux

# k8s nodes run node_exporter as an in-cluster DaemonSet pod
# (hostNetwork, :9100). The Debian prometheus-node-exporter package
# would collide on that port, so baseline removes it here instead of
# installing it. k8s-node cert-expiry metrics reach Prometheus by
# another path — see slices/deferred/internal-tls-monitoring.md.
baseline_node_exporter: false
