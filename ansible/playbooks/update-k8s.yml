---
# update-k8s.yml — drain-aware rolling upgrade for a microk8s cluster.
#
# Per host (serial: 1, one node at a time):
#   1. Hand off opt-in workloads (cordon + rollout restart of any
#      Deployment carrying iac.webathome.org/pre-drain=true) so they
#      surge to a healthy peer before the drain. See
#      tasks/pre-drain-handoff.yml.
#   2. Drain via the cluster primary (skipped on single-node clusters).
#   3. Refresh the microk8s snap to the channel pinned in group_vars
#      / host_vars — no-op when already current.
#   4. apt full-upgrade — kernel + security + package updates.
#   5. Reboot if /var/run/reboot-required is present (kernel/glibc/etc.).
#   6. Wait for microk8s Ready, both post-refresh and post-reboot.
#   7. Uncordon via the primary (skipped on single-node clusters).
#
# Targeting: `hosts: k8s` resolves to k8s_prd + k8s_dev under prd or
# k8s_scratch under scratch. Pair with --limit to scope to one cluster.
#
# Per decisions.md "Cluster changes are serialized": serial: 1 is
# non-negotiable; cluster-state writes against dqlite race past two
# concurrent mutations.
#
# kubectl drain runs from the primary so the command source survives
# the API blip when snap-refresh restarts microk8s on the target.
#
# Primary is elected runtime per cluster (lowest-hostname in-cluster
# member, then running-solo, then alphabetical seed). The election
# play runs first against the full k8s group so every host's
# hostvars carry the elected primary before the serial: 1 batch
# starts — without that, the per-host peer-count and drain delegation
# can't see other hosts' values.

- name: Elect microk8s primary per cluster
  hosts: k8s
  become: true
  gather_facts: false
  tasks:
    - name: Elect primary
      ansible.builtin.import_role:
        name: microk8s
        tasks_from: elect-primary

- name: Rolling upgrade for k8s cluster members
  hosts: k8s
  become: true
  gather_facts: true
  serial: 1
  tasks:
    - name: Read currently-installed microk8s version
      # Output (last line):
      #   microk8s  v1.32.13 8092   1.32/stable   canonical✓  classic
      # Column 2 is Version (vMAJOR.MINOR.PATCH); column 4 is Tracking.
      ansible.builtin.command: snap list microk8s --color=never
      register: _snap_list
      changed_when: false
      check_mode: false

    - name: Refuse microk8s minor-version skips
      # microk8s/Kubernetes only support N → N+1 minor jumps; skipping
      # a minor (e.g. 1.30 → 1.32 in one snap refresh) is unsupported
      # and the kubelet/API-server skew breaks workloads. Multi-minor
      # upgrades become multi-roll: bump microk8s_channel one minor
      # in inventory, run the playbook, soak under real workload, then
      # advance the channel again.
      #
      # The check also blocks downgrades (target < current). Use
      # `snap revert microk8s` for those, not this playbook.
      ansible.builtin.assert:
        that:
          - _target_minor - _current_minor <= 1
          - _target_minor - _current_minor >= 0
        fail_msg: >-
          Refusing to step microk8s on {{ inventory_hostname }} from
          1.{{ _current_minor }} to 1.{{ _target_minor }} (channel
          {{ microk8s_channel }}). microk8s only supports one-minor
          jumps; skipping is unsupported. Bump microk8s_channel one
          minor at a time in group_vars/host_vars, run, soak, advance.
      vars:
        _current_minor: "{{ _snap_list.stdout_lines[-1].split()[1].lstrip('v').split('.')[1] | int }}"
        _target_minor: "{{ microk8s_channel.split('/')[0].split('-')[0].split('.')[1] | int }}"

    - name: Compute cluster-peer count
      # Cluster boundary: hosts in the inventory's `k8s` parent group
      # that share this host's primary. Uses `groups['k8s']` rather
      # than `ansible_play_hosts_all` because the latter is filtered
      # by --limit — a `--limit srvk8sl1` invocation against a 3-node
      # cluster would otherwise see peer_count=1 and skip drain.
      ansible.builtin.set_fact:
        _cluster_peer_count: >-
          {{ groups['k8s']
             | map('extract', hostvars)
             | selectattr('microk8s_primary_host', 'eq', microk8s_primary_host)
             | list
             | length }}

    - name: Hand off labeled workloads off {{ inventory_hostname }}
      # Cordons the node and rollout-restarts opt-in Deployments off
      # it before the drain below fires. See tasks/pre-drain-handoff.yml.
      ansible.builtin.import_tasks: tasks/pre-drain-handoff.yml

    - name: Drain {{ inventory_hostname }}
      ansible.builtin.command:
        argv:
          - microk8s
          - kubectl
          - drain
          - "{{ inventory_hostname }}"
          - --ignore-daemonsets
          - --delete-emptydir-data
          - --timeout=300s
      delegate_to: "{{ microk8s_primary_host }}"
      when: _cluster_peer_count | int > 1
      changed_when: true

    - name: Refresh microk8s to latest revision in {{ microk8s_channel }}
      # community.general.snap's `state` doesn't include a refresh
      # option in the version we use (only absent/present/enabled/
      # disabled). state: present acts on channel mismatches but
      # leaves the snap pinned to whatever revision was current at
      # install time — exactly the gap a periodic update playbook is
      # meant to close. Use the snap CLI directly: `snap refresh
      # --channel=...` switches channel + pulls latest in one call.
      # Idempotent via output parsing — snap prints "has no updates
      # available" when there's nothing to do (output goes to stdout
      # in modern snap, stderr in older — search both to be safe).
      ansible.builtin.command:
        argv:
          - snap
          - refresh
          - microk8s
          - "--channel={{ microk8s_channel }}"
      register: _snap_refresh
      changed_when: '"has no updates available" not in (_snap_refresh.stdout + _snap_refresh.stderr)'

    - name: Wait for microk8s Ready post-snap-refresh
      ansible.builtin.command: microk8s status --wait-ready --timeout 120
      changed_when: false

    - name: Apt full-upgrade
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true
        cache_valid_time: 3600
      environment:
        NEEDRESTART_MODE: a

    - name: Check whether a reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: _reboot_required

    - name: Reboot if required
      ansible.builtin.reboot:
        msg: "update-k8s.yml: reboot triggered by /var/run/reboot-required"
        post_reboot_delay: 30
        reboot_timeout: 600
      when: _reboot_required.stat.exists

    - name: Wait for microk8s Ready post-reboot
      ansible.builtin.command: microk8s status --wait-ready --timeout 240
      changed_when: false
      when: _reboot_required.stat.exists

    - name: Uncordon {{ inventory_hostname }}
      ansible.builtin.command:
        argv:
          - microk8s
          - kubectl
          - uncordon
          - "{{ inventory_hostname }}"
      delegate_to: "{{ microk8s_primary_host }}"
      when: _cluster_peer_count | int > 1
      changed_when: true
