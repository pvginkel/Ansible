---
# update-k8s.yml — drain-aware rolling upgrade for a microk8s cluster.
#
# Per host (serial: 1, one node at a time):
#   0. Probe pending mutations without touching the node: snap channel
#      drift, snap revision update available, upgradable apt packages,
#      pre-existing /var/run/reboot-required, PVE [PENDING] config.
#      If none, skip the entire cordon → drain → mutate → reboot →
#      uncordon cycle for this host. So this playbook doubles as the
#      canonical "apply whatever's pending" entry point — including
#      Terraform-driven hardware changes, where the only signal is
#      PVE [PENDING] and there's no kernel/snap work to do.
#   1. Hand off opt-in workloads (cordon + rollout restart of any
#      Deployment carrying iac.webathome.org/pre-drain=true) so they
#      surge to a healthy peer before the drain. See
#      tasks/pre-drain-handoff.yml.
#   2. Drain via the cluster primary (skipped on single-node clusters).
#   3. Refresh the microk8s snap to the channel pinned in group_vars
#      / host_vars — no-op when already current.
#   4. apt full-upgrade — kernel + security + package updates.
#   5. If PVE has pending VM config (TF-driven memory/cpu/NIC/disk
#      change), cold-cycle the VM via `qm shutdown` + `qm start` from
#      its PVE node — a guest-side `shutdown -r` doesn't power-cycle
#      QEMU and would leave [PENDING] unmerged. Else if
#      /var/run/reboot-required is present (kernel/glibc/etc.), do a
#      guest reboot. The cold-cycle path subsumes both.
#   6. Wait for microk8s Ready after every cycle that touches the kernel.
#   7. Uncordon via the primary (skipped on single-node clusters).
#
# Targeting: `hosts: k8s` resolves to k8s_prd + k8s_dev under prd or
# k8s_scratch under scratch. Pair with --limit to scope to one cluster.
#
# Per decisions.md "Cluster changes are serialized": serial: 1 is
# non-negotiable; cluster-state writes against dqlite race past two
# concurrent mutations.
#
# kubectl drain runs from the primary so the command source survives
# the API blip when snap-refresh restarts microk8s on the target.
#
# Primary is elected runtime per cluster (lowest-hostname in-cluster
# member, then running-solo, then alphabetical seed). The election
# play runs first against the full k8s group so every host's
# hostvars carry the elected primary before the serial: 1 batch
# starts — without that, the per-host peer-count and drain delegation
# can't see other hosts' values.

- name: Preflight — every targeted node answers SSH + sudo
  # Ansible drops an unreachable host and rolls on by default; for a
  # serial: 1 roll that means draining the survivors of an already-
  # degraded cluster — the maxSurge-starved state the cordon precheck
  # below frets about. any_errors_fatal turns the first unreachable
  # member into a clean whole-run abort here, before play 3 cordons a
  # node. The ping runs under become so a sudo failure (build #7) counts
  # as unreachable too, not just a dead SSH transport. ansible_timeout is
  # the whole budget — a healthy node answers in well under a second; a
  # down one fails fast. Criticality is the caller's call: the
  # scheduled-update Jenkinsfile --limits prod clusters into hard-fail
  # stages and dev/scratch into catchError stages.
  hosts: k8s
  become: true
  gather_facts: false
  any_errors_fatal: true
  tasks:
    - name: Confirm SSH + sudo
      ansible.builtin.ping:
      vars:
        ansible_timeout: 20

- name: Elect microk8s primary per cluster
  hosts: k8s
  become: true
  gather_facts: false
  tasks:
    - name: Elect primary
      ansible.builtin.import_role:
        name: microk8s
        tasks_from: elect-primary

- name: Refuse to roll if a cordoned node sits outside this run's target
  # The cycle's rescue uncordons on failure, so a leftover cordon is now
  # the rare case where that rescue *also* failed (e.g. the primary was
  # unreachable when it tried to uncordon) — a genuine "something is
  # wrong" signal worth stopping for. Two shapes to distinguish:
  #
  #   - Cordoned node IS in this run's target set → resume case.
  #     The operator is re-running update-k8s.yml --limit <same target>
  #     to pick up where the prior run failed. Pre-drain-handoff is
  #     idempotent (cordon stays set, rollout restart re-fires on
  #     opt-in Deployments, drain on an already-empty node returns
  #     fast). Allow and continue.
  #
  #   - Cordoned node is OUTSIDE the target set → refuse. Re-running
  #     blindly into that state breaks surge scheduling — a 3-node
  #     cluster with 2 cordoned peers can't land keycloak's
  #     RollingUpdate maxSurge=1 onto a healthy node, and the
  #     resulting pod-sandbox errors are opaque. Fail fast instead.
  #
  # `kubectl get nodes` via the local apiserver is naturally scoped
  # to the host's cluster, so prd and dev are each checked against
  # their own primary.
  hosts: k8s
  become: true
  gather_facts: false
  tasks:
    - name: List cordoned nodes via this cluster's primary
      ansible.builtin.command:
        argv:
          - microk8s
          - kubectl
          - get
          - nodes
          - -o
          - jsonpath={range .items[?(@.spec.unschedulable==true)]}{.metadata.name}{"\n"}{end}
      delegate_to: "{{ microk8s_primary_host }}"
      register: _precheck_cordoned
      changed_when: false
      check_mode: false

    - name: Refuse if a cordoned node is not part of this run
      ansible.builtin.assert:
        that:
          - (_precheck_cordoned.stdout_lines | difference(ansible_play_hosts_all)) | length == 0
        fail_msg: >-
          Cordoned nodes detected via {{ microk8s_primary_host }} that
          are not part of this run:
          {{ (_precheck_cordoned.stdout_lines | difference(ansible_play_hosts_all)) | join(', ') }}.
          A prior run failed and its rescue could not uncordon (likely the
          primary was unreachable). Uncordon them (`microk8s kubectl
          uncordon <node>` on the primary) and re-run.

    - name: Note already-cordoned targets (resume case)
      ansible.builtin.debug:
        msg: >-
          Resuming with already-cordoned target(s):
          {{ _precheck_cordoned.stdout_lines | intersect(ansible_play_hosts_all) | join(', ') }}.
          Pre-drain-handoff is idempotent; the cycle will pick up where
          the prior run left off.
      when: (_precheck_cordoned.stdout_lines | intersect(ansible_play_hosts_all)) | length > 0

- name: Rolling upgrade for k8s cluster members
  hosts: k8s
  become: true
  gather_facts: true
  serial: 1
  tasks:
    - name: Read currently-installed microk8s version
      # Output (last line):
      #   microk8s  v1.32.13 8092   1.32/stable   canonical✓  classic
      # Column 2 is Version (vMAJOR.MINOR.PATCH); column 4 is Tracking.
      ansible.builtin.command: snap list microk8s --color=never
      register: _snap_list
      changed_when: false
      check_mode: false

    - name: Refuse microk8s minor-version skips
      # microk8s/Kubernetes only support N → N+1 minor jumps; skipping
      # a minor (e.g. 1.30 → 1.32 in one snap refresh) is unsupported
      # and the kubelet/API-server skew breaks workloads. Multi-minor
      # upgrades become multi-roll: bump microk8s_channel one minor
      # in inventory, run the playbook, soak under real workload, then
      # advance the channel again.
      #
      # The check also blocks downgrades (target < current). Use
      # `snap revert microk8s` for those, not this playbook.
      ansible.builtin.assert:
        that:
          - _target_minor - _current_minor <= 1
          - _target_minor - _current_minor >= 0
        fail_msg: >-
          Refusing to step microk8s on {{ inventory_hostname }} from
          1.{{ _current_minor }} to 1.{{ _target_minor }} (channel
          {{ microk8s_channel }}). microk8s only supports one-minor
          jumps; skipping is unsupported. Bump microk8s_channel one
          minor at a time in group_vars/host_vars, run, soak, advance.
      vars:
        _current_minor: "{{ _snap_list.stdout_lines[-1].split()[1].lstrip('v').split('.')[1] | int }}"
        _target_minor: "{{ microk8s_channel.split('/')[0].split('-')[0].split('.')[1] | int }}"

    - name: Compute cluster-peer count
      # Cluster boundary: the host's `k8s_<env>` child group — same
      # boundary elect-primary uses. Inventory groups, not
      # `ansible_play_hosts_all`, so a `--limit srvk8s1` invocation
      # against a 3-node cluster doesn't see peer_count=1 and skip
      # drain. Reading group membership instead of remote hostvars
      # also tolerates --limit excluding some clusters entirely (the
      # election play runs under the same --limit, so un-limited
      # hosts won't carry microk8s_primary_host).
      ansible.builtin.set_fact:
        _cluster_peer_count: >-
          {{ groups[group_names | select('match', '^k8s_') | first] | length }}

    - name: List pending snap refreshes
      # `snap refresh --list` enumerates snaps with a newer revision
      # waiting on their tracking channel. We grep stdout for a
      # microk8s line — empty means current. Pure read; the actual
      # refresh below still runs idempotently inside the cycle block.
      ansible.builtin.command: snap refresh --list
      register: _snap_refresh_list
      changed_when: false
      check_mode: false

    - name: Refresh apt cache to gauge pending upgrades
      # Match cache_valid_time with the full-upgrade task below so
      # back-to-back runs share one cache hit.
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      check_mode: false

    - name: List upgradable apt packages
      # stdout_lines[0] is always the "Listing..." header; length > 1
      # means at least one package would upgrade. LC_ALL=C keeps that
      # header stable across locales. Treated as "drain warranted" even
      # if no kernel is involved — containerd/kubelet/glibc upgrades
      # restart services and we want the node out of rotation first.
      ansible.builtin.command: apt list --upgradable
      register: _apt_upgradable_list
      changed_when: false
      check_mode: false
      environment:
        LC_ALL: C

    - name: Check whether a reboot is already pending
      # Catches the "prior run installed a kernel but didn't reboot"
      # case so we still cycle. Re-stat'd post-apt inside the cycle
      # block to catch kernels this run is about to install.
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: _reboot_required

    - name: Detect PVE pending config for {{ inventory_hostname }}
      # PVE writes a [PENDING] section to <vmid>.conf only for keys
      # that need a VM restart to take effect (memory, CPU, NICs,
      # disks). Tags/description/name go live immediately and never
      # land here, so the section's presence is a clean signal of
      # "true hardware change waiting to be applied." A guest-side
      # `shutdown -r` doesn't power-cycle QEMU, so [PENDING] persists
      # across `ansible.builtin.reboot` — only `qm shutdown` +
      # `qm start` (or `qm reboot` on modern PVE) merges it.
      ansible.builtin.command:
        argv:
          - grep
          - -q
          - '^\[PENDING\]'
          - "/etc/pve/qemu-server/{{ vm_id }}.conf"
      register: _pve_pending_check
      delegate_to: "{{ pve_node }}"
      changed_when: false
      check_mode: false
      failed_when: _pve_pending_check.rc not in [0, 1]

    - name: Record probe results for {{ inventory_hostname }}
      ansible.builtin.set_fact:
        _pve_pending: "{{ _pve_pending_check.rc == 0 }}"
        _snap_channel_mismatch: "{{ _snap_list.stdout_lines[-1].split()[3] != microk8s_channel }}"
        _snap_refresh_pending: "{{ _snap_refresh_list.stdout_lines | select('match', '^microk8s\\s') | list | length > 0 }}"
        _apt_upgrades_pending: "{{ _apt_upgradable_list.stdout_lines | length > 1 }}"

    - name: Compute drain-cycle decision for {{ inventory_hostname }}
      # Cordon + drain are expensive — running them when nothing
      # would mutate is pure cost. Gate the whole cycle on a single
      # precomputed fact so a "nothing pending" run no-ops the host
      # cleanly and the playbook can serve double duty for routine
      # upgrades and for applying Terraform-driven hardware changes.
      ansible.builtin.set_fact:
        _needs_cycle: >-
          {{ _pve_pending
             or _reboot_required.stat.exists
             or _snap_channel_mismatch
             or _snap_refresh_pending
             or _apt_upgrades_pending }}

    - name: Report cycle decision for {{ inventory_hostname }}
      ansible.builtin.debug:
        msg: >-
          needs_cycle={{ _needs_cycle }}
          (pve_pending={{ _pve_pending }},
          reboot_pending={{ _reboot_required.stat.exists }},
          snap_channel_mismatch={{ _snap_channel_mismatch }},
          snap_refresh_pending={{ _snap_refresh_pending }},
          apt_upgrades_pending={{ _apt_upgrades_pending }})

    - name: Cordon → mutate → reboot → uncordon cycle
      when: _needs_cycle
      block:
        - name: Hand off labeled workloads off {{ inventory_hostname }}
          # Cordons the node and rollout-restarts opt-in Deployments off
          # it before the drain below fires. See tasks/pre-drain-handoff.yml.
          ansible.builtin.import_tasks: tasks/pre-drain-handoff.yml

        - name: Drain {{ inventory_hostname }}
          # 15-minute drain budget. srvk8s1 carries ~50 pods plus the
          # storage namespace's CronJob fleet; with kubectl's default 5 qps
          # client-side throttling the eviction loop alone burns ~30s of
          # request-time, and several workloads have long graceful-shutdown
          # paths (keycloak-db's 600s preStop + tGPS, prometheus-alertmanager
          # stateful drain, design-assistant rabbitmq cluster handoff). The
          # earlier 300s left no room for the slow tail and aborted the play
          # with most pods successfully evicted but a handful still
          # Terminating.
          #
          # Retry on failure: kine (microk8s' dqlite shim) intermittently
          # returns `rpc error: code = Unknown desc = exec (try: N): database
          # is locked` for eviction writes under burst contention. Build #25
          # hit this on two of ~40 evictions — most pods successfully drained
          # but `kubectl drain` exited rc=1 after ~23s. The node is already
          # cordoned and most pods already gone, so re-running drain converges
          # quickly. 3×30s lets a transient lock burst clear; a fourth
          # consecutive failure is real and should fail the play loudly.
          ansible.builtin.command:
            argv:
              - microk8s
              - kubectl
              - drain
              - "{{ inventory_hostname }}"
              - --ignore-daemonsets
              - --delete-emptydir-data
              - --force
              - --timeout=900s
          delegate_to: "{{ microk8s_primary_host }}"
          when: _cluster_peer_count | int > 1
          register: _drain_result
          retries: 3
          delay: 30
          until: _drain_result.rc == 0
          changed_when: true

        - name: Refresh microk8s to latest revision in {{ microk8s_channel }}
          # community.general.snap's `state` doesn't include a refresh
          # option in the version we use (only absent/present/enabled/
          # disabled). state: present acts on channel mismatches but
          # leaves the snap pinned to whatever revision was current at
          # install time — exactly the gap a periodic update playbook is
          # meant to close. Use the snap CLI directly: `snap refresh
          # --channel=...` switches channel + pulls latest in one call.
          # Idempotent via output parsing — snap prints "has no updates
          # available" when there's nothing to do (output goes to stdout
          # in modern snap, stderr in older — search both to be safe).
          ansible.builtin.command:
            argv:
              - snap
              - refresh
              - microk8s
              - "--channel={{ microk8s_channel }}"
          register: _snap_refresh
          changed_when: '"has no updates available" not in (_snap_refresh.stdout + _snap_refresh.stderr)'

        - name: Wait for microk8s Ready post-snap-refresh
          ansible.builtin.command: microk8s status --wait-ready --timeout 120
          changed_when: false

        - name: Apt full-upgrade
          ansible.builtin.apt:
            upgrade: dist
            update_cache: true
            cache_valid_time: 3600
          environment:
            NEEDRESTART_MODE: a

        - name: Apt autoremove
          # Each kernel bump leaves behind a linux-headers-* tree; left
          # alone they accumulate one set per release and eventually
          # exhaust /boot inodes. Run unconditionally — autoremove is a
          # no-op when nothing is orphaned.
          ansible.builtin.apt:
            autoremove: true
          environment:
            NEEDRESTART_MODE: a

        - name: Re-check whether a reboot is now required (post-apt)
          # apt may have just installed a new kernel/glibc; the
          # pre-drain stat only captured what was pending at probe time.
          ansible.builtin.stat:
            path: /var/run/reboot-required
          register: _reboot_required

        - name: Cold-cycle via PVE to apply pending config on {{ inventory_hostname }}
          # The cold cycle subsumes /var/run/reboot-required when both
          # are true — no need to also fire the guest-reboot branch.
          when: _pve_pending
          block:
            - name: Send qm shutdown for {{ inventory_hostname }}
              # --forceStop 1 forces if the guest doesn't ACPI-shutdown
              # within --timeout; the node is already drained, so a hard
              # stop after 5 minutes is safe and keeps the roll moving.
              ansible.builtin.command:
                argv:
                  - qm
                  - shutdown
                  - "{{ vm_id }}"
                  - --timeout
                  - "300"
                  - --forceStop
                  - "1"
              delegate_to: "{{ pve_node }}"
              changed_when: true

            - name: Send qm start for {{ inventory_hostname }}
              ansible.builtin.command:
                argv:
                  - qm
                  - start
                  - "{{ vm_id }}"
              delegate_to: "{{ pve_node }}"
              changed_when: true

            - name: Wait for SSH after cold-cycle of {{ inventory_hostname }}
              # A full power-cycle (qm shutdown forceStop up to 300s, then
              # cold boot) is strictly slower than the guest reboot above,
              # so match its 1200s budget rather than the old 600s.
              ansible.builtin.wait_for_connection:
                delay: 30
                timeout: 1200

            - name: Wait for microk8s Ready after cold-cycle of {{ inventory_hostname }}
              ansible.builtin.command: microk8s status --wait-ready --timeout 240
              changed_when: false

        - name: Reboot if required (guest-side; no PVE pending)
          ansible.builtin.reboot:
            msg: "update-k8s.yml: reboot triggered by /var/run/reboot-required"
            post_reboot_delay: 30
            # 600s aborted builds #3/#4 by ~30s — these nodes boot + bring
            # microk8s/containerd back slower than a vanilla host. 1200s
            # gives real headroom rather than racing the boot.
            reboot_timeout: 1200
          when:
            - not _pve_pending
            - _reboot_required.stat.exists

        - name: Wait for microk8s Ready post-reboot
          ansible.builtin.command: microk8s status --wait-ready --timeout 240
          changed_when: false
          when:
            - not _pve_pending
            - _reboot_required.stat.exists

        - name: Uncordon {{ inventory_hostname }}
          ansible.builtin.command:
            argv:
              - microk8s
              - kubectl
              - uncordon
              - "{{ inventory_hostname }}"
          delegate_to: "{{ microk8s_primary_host }}"
          when: _cluster_peer_count | int > 1
          changed_when: true

      rescue:
        # Any failure inside the cycle aborts after pre-drain-handoff has
        # already cordoned the node. Leaving it cordoned strands it out of
        # rotation until someone notices — the recurring operational pain
        # this playbook kept causing. Uncordon it here, then re-raise so
        # the run still fails loudly (serial: 1 stops the roll; the
        # Jenkins notifier fires). Best-effort: if the uncordon itself
        # errors (e.g. primary unreachable) don't mask the original
        # failure — the top-of-play precheck is the backstop for that.
        - name: Uncordon {{ inventory_hostname }} after a failed cycle
          ansible.builtin.command:
            argv:
              - microk8s
              - kubectl
              - uncordon
              - "{{ inventory_hostname }}"
          delegate_to: "{{ microk8s_primary_host }}"
          when: _cluster_peer_count | int > 1
          changed_when: true
          ignore_errors: true

        - name: Re-raise the cycle failure for {{ inventory_hostname }}
          ansible.builtin.fail:
            msg: >-
              update-k8s cycle failed on {{ inventory_hostname }}
              (failed task: {{ ansible_failed_task.name | default('unknown') }}).
              Node uncordoned to keep it in rotation; see the error above.
