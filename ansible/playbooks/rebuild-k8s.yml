---
# rebuild-k8s.yml — Ansible-side steps for one k8s VM rebuild.
#
# Drain (against the old identity) and `terraform apply` are
# operator-driven runbook steps. Per decisions.md "Terraform and
# Ansible are peer tools — neither invokes the other," this
# playbook starts after the new VM exists and is reachable on its
# new hostname. The full operator flow lives in
# docs/runbooks/k8s-rebuild.md.
#
# Run per host (one at a time):
#   ansible-playbook playbooks/rebuild-k8s.yml -e rebuild_target=<new-hostname>
#
# Per decisions.md "Cluster changes are serialized," never run
# against more than one rebuild target at a time.
#
# Primary is elected runtime per cluster. Election runs across the
# whole k8s group first so the targeted-host play below sees the
# survivor cluster members via hostvars and elects one of them as
# the join-token mint — the rebuild target itself is fresh and would
# otherwise win election against an empty hostvars set.

# A freshly-rebuilt VM has no SSH host certificate until the
# ssh_host_cert role signs it one during the converge below — so the
# committed `@cert-authority` line cannot yet vouch for it. Seed a
# transient known_hosts from `terraform output` (the host key
# Terraform generated and embedded via cloud-init — authoritative, no
# TOFU) for the single pre-certificate bootstrap connection. Every
# later connection in the run trusts the host certificate normally.
# See AnsibleSpecs slices/ssh-host-ca.md.
- name: Seed a transient known_hosts for the rebuilt host
  hosts: localhost
  gather_facts: false
  become: false
  vars:
    _tf_workspace: "{{ playbook_dir }}/../../terraform/prd"
    _transient_known_hosts: "{{ playbook_dir }}/../../tmp/bootstrap-known-hosts"
  tasks:
    - name: Read from-scratch host public keys from terraform output
      ansible.builtin.command:
        argv:
          - terraform
          - "-chdir={{ _tf_workspace }}"
          - output
          - -json
          - host_pubkeys
      register: _tf_host_pubkeys
      changed_when: false
      check_mode: false

    - name: Require a host key for the rebuild target
      ansible.builtin.assert:
        that: rebuild_target in (_tf_host_pubkeys.stdout | from_json)
        fail_msg: >-
          terraform output host_pubkeys has no entry for
          {{ rebuild_target }} — has `terraform apply` run for this VM?

    - name: Ensure the transient known_hosts directory exists
      ansible.builtin.file:
        path: "{{ _transient_known_hosts | dirname }}"
        state: directory
        mode: "0755"
      check_mode: false

    - name: Write the rebuilt host's pinned key to the transient known_hosts
      ansible.builtin.copy:
        dest: "{{ _transient_known_hosts }}"
        content: "{{ rebuild_target }},{{ rebuild_target }}.home {{ (_tf_host_pubkeys.stdout | from_json)[rebuild_target] }}\n"
        mode: "0644"
      # Written under --check too: the bootstrap play's ssh verification
      # depends on the file existing before it connects.
      check_mode: false

- name: Elect microk8s primary per cluster
  hosts: k8s
  become: true
  gather_facts: false
  tasks:
    - name: Elect primary
      ansible.builtin.import_role:
        name: microk8s
        tasks_from: elect-primary

- name: Apply bootstrap + baseline + managed_filesystems + microk8s to the rebuilt host
  hosts: "{{ rebuild_target | mandatory }}"
  become: true
  gather_facts: true
  vars:
    # The rebuilt VM presents a bare host key until ssh_host_cert (the
    # last role below) signs it a certificate. Replace ssh_args
    # wholesale — for repeated `-o` options OpenSSH takes the first
    # value, so an appended common_args cannot override ansible.cfg's
    # UserKnownHostsFile. The transient file (previous play) carries
    # the pre-certificate key; known_hosts.d/homelab carries the
    # `@cert-authority` line. The rest mirrors ansible.cfg's ssh_args.
    ansible_ssh_args: >-
      -o ControlMaster=auto -o ControlPersist=60s
      -o PreferredAuthentications=publickey
      -o "UserKnownHostsFile={{ playbook_dir }}/../../tmp/bootstrap-known-hosts {{ playbook_dir }}/../files/known_hosts.d/homelab"
      -o GlobalKnownHostsFile=/dev/null
      -o HostKeyAlgorithms=ssh-ed25519-cert-v01@openssh.com,ssh-ed25519
      -o IdentityFile=~/.ssh/id_ed25519_ansible -o IdentitiesOnly=yes
  roles:
    - role: bootstrap
    - role: baseline
    # managed_filesystems must run before microk8s. snap state under
    # /var/snap is shadowed once the data volume mounts on top, so the
    # mount has to land before the snap install populates the path.
    - role: managed_filesystems
    - role: microk8s
    # Last: ssh_host_cert needs the homelab CA root (baseline) and the
    # `ca.home` /etc/hosts pin (microk8s). See slices/ssh-host-ca.md.
    - role: ssh_host_cert

- name: Cordon, import ZFS pools, gate scheduling on DaemonSet readiness, uncordon
  hosts: "{{ rebuild_target }}"
  become: true
  gather_facts: false
  tasks:
    - name: "Cordon {{ rebuild_target }} so workloads don't race ahead of DaemonSets"
      # Race window of ~1-2 seconds between microk8s join (end of the
      # previous play) and this task is acceptable: a Pending pod that
      # lands on the new node before the cordon will block on the still-
      # arriving DaemonSets (Ceph CSI takes ~3 minutes; Calico, MetalLB
      # speaker, node-exporter, SMB CSI follow) and recover on its own
      # — just more event-log noise. The race-free alternative is
      # `--register-with-taints` on kubelet, which requires explicit
      # tolerations on every critical DaemonSet (HelmCharts territory).
      # Retries cover the brief gap where kubelite may not have surfaced
      # the new node to the API yet.
      ansible.builtin.command:
        argv: [microk8s, kubectl, cordon, "{{ rebuild_target }}"]
      register: _cordon_result
      until: _cordon_result.rc == 0
      retries: 60
      delay: 2
      changed_when: true

    - name: List currently-imported ZFS pools
      ansible.builtin.command: zpool list -H -o name
      register: _zpool_list
      changed_when: false
      check_mode: false
      failed_when: false
      when: zpools_to_import | default([]) | length > 0

    - name: Import each declared zpool that isn't yet imported
      # zpools_to_import is declared per-host in host_vars on rebuilt
      # nodes that carry a passthrough ZFS volume (today: srvk8s1's
      # zpool2 on the NVMe). The loop only fires on hosts that opt in.
      #
      # `-f` is required because rebuild-k8s.yml runs against a fresh
      # VM with a new ZFS hostid; ZFS sees the pool's last-known
      # hostid (the destroyed VM's) and refuses a plain import as a
      # safety check against two systems mounting the same pool. The
      # source VM is destroyed before the apply that reattaches the
      # NVMe to the new VM, so the multi-mount risk that `-f` overrides
      # cannot apply here.
      ansible.builtin.command:
        argv: [zpool, import, "-f", "{{ item }}"]
      loop: "{{ zpools_to_import | default([]) }}"
      when: item not in (_zpool_list.stdout_lines | default([]))
      changed_when: true

    - name: "Wait for {{ rebuild_target }} to report Ready"
      # `microk8s status --wait-ready` substring-matches " Ready " (with
      # surrounding spaces) in `kubectl get nodes` output via its
      # is_cluster_ready() helper. A cordoned node prints
      # `Ready,SchedulingDisabled` — comma instead of trailing space —
      # so the match fails. On multi-node clusters the bug is masked
      # by other Ready rows; on a single-node dev cluster (cordoned by
      # the previous task) it's deterministic. Probe the node's Ready
      # condition directly, which is independent of SchedulingDisabled.
      ansible.builtin.command:
        argv:
          - microk8s
          - kubectl
          - wait
          - --for=condition=Ready
          - "node/{{ rebuild_target }}"
          - --timeout=300s
      changed_when: false

    - name: "Wait until at least one DaemonSet pod is scheduled on {{ rebuild_target }}"
      # `kubectl wait` returns 0 immediately if no resources match the
      # selector, so confirm the DaemonSet controllers have actually
      # placed pods before treating "all pods Ready" as meaningful.
      # New DaemonSets added in the future are automatically covered —
      # the selector is `ownerReferences[0].kind == DaemonSet` across
      # all namespaces, not a hard-coded list.
      ansible.builtin.command:
        argv:
          - microk8s
          - kubectl
          - get
          - pods
          - --all-namespaces
          - "--field-selector=spec.nodeName={{ rebuild_target }}"
          - "-o=jsonpath={range .items[?(@.metadata.ownerReferences[0].kind=='DaemonSet')]}{.metadata.namespace}/{.metadata.name}{'\\n'}{end}"
      register: _ds_pods_on_target
      until: _ds_pods_on_target.stdout | trim | length > 0
      retries: 30
      delay: 2
      changed_when: false

    - name: "Wait for every pod on {{ rebuild_target }} to reach Ready"
      # Includes every DaemonSet pod the controllers placed here (Ceph
      # CSI is the slow one at ~3 minutes), plus any racy regular pod
      # that snuck in before the cordon. A pod that can't reach Ready
      # — image-pull stuck, init container failing, anything — fails
      # the wait; leave the node cordoned so the operator can triage,
      # then re-run rebuild-k8s.yml after the fix (the cordon and the
      # waits are idempotent on a re-run).
      ansible.builtin.command:
        argv:
          - microk8s
          - kubectl
          - wait
          - --for=condition=Ready
          - pod
          - --all-namespaces
          - "--field-selector=spec.nodeName={{ rebuild_target }}"
          - --timeout=600s
      changed_when: false

    - name: "Uncordon {{ rebuild_target }} now that scheduled DaemonSets are Ready"
      ansible.builtin.command:
        argv: [microk8s, kubectl, uncordon, "{{ rebuild_target }}"]
      changed_when: true
