---
- name: Apply bootstrap and baseline to managed hosts
  # k8s + ceph clusters are excluded at the play level — drain-requiring
  # role applies on those hosts flow only through update-k8s.yml /
  # rebuild-k8s.yml (future: update-ceph.yml). openbao is excluded for
  # the same reason: its converge flows through site-openbao.yml, which
  # carries the Play 0 known_hosts handoff srvvaultN needs before
  # ssh_host_cert has signed them. Phase 1 (iac-agent) makes this
  # contract explicit; the larger structural question — whether
  # site.yml is the right organizing artefact at all once exclusions
  # start accumulating — is carved into slices/site-yml-layout.md in
  # the AnsibleSpecs repo.
  hosts: managed:!k8s_prd:!k8s_dev:!ceph_prd:!openbao
  become: true
  gather_facts: true
  roles:
    - role: bootstrap
    - role: baseline
    - role: managed_filesystems
    # Last: ssh_host_cert relies on baseline having installed the
    # homelab CA root into the trust store. Issues/renews this host's
    # SSH host certificate. See slices/ssh-host-ca.md.
    - role: ssh_host_cert

- name: Apply Proxmox node configuration
  hosts: proxmox
  become: true
  gather_facts: true
  roles:
    - role: proxmox_host

- name: Apply iac_agent role to srviac
  # Self-mutation safety lives at the call site, not here — the
  # iac-on-push Jenkins job passes --limit '!iac_agent' so the
  # orchestrator never re-applies itself. Operator workstation runs
  # `site.yml --limit srviac` for agent-VM mutation.
  hosts: iac_agent
  become: true
  gather_facts: true
  roles:
    - role: iac_agent
