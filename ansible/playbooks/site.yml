---
- name: Apply bootstrap and baseline to managed hosts
  # k8s + ceph clusters are excluded at the play level — drain-requiring
  # role applies on those hosts flow only through update-k8s.yml /
  # rebuild-k8s.yml (future: update-ceph.yml). Phase 1 (iac-agent) makes
  # this contract explicit; the larger structural question — whether
  # site.yml is the right organizing artefact at all once exclusions
  # start accumulating — is carved into slices/site-yml-layout.md in
  # the AnsibleSpecs repo.
  hosts: managed:!k8s_prd:!k8s_dev:!ceph_prd
  become: true
  gather_facts: true
  roles:
    - role: bootstrap
    - role: baseline
    - role: managed_filesystems

- name: Apply Proxmox node configuration
  hosts: proxmox
  become: true
  gather_facts: true
  roles:
    - role: proxmox_host
