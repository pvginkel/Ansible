---
- name: Apply bootstrap and baseline to managed hosts
  # `managed` excludes data-only inventory entries (e.g. pve_vms_unmanaged).
  # Pair with --limit in day-to-day use.
  hosts: managed
  become: true
  gather_facts: true
  roles:
    - role: bootstrap
    - role: baseline
    - role: managed_filesystems

- name: Apply Proxmox node configuration
  hosts: proxmox
  become: true
  gather_facts: true
  roles:
    - role: proxmox_host

- name: Apply microk8s to k8s nodes
  # `k8s` resolves to k8s_prd + k8s_dev (under inventories/prd) or
  # k8s_scratch (under inventories/scratch); per-cluster CIDRs, addons,
  # and primary host live in group_vars/k8s_<cluster>.yml.
  hosts: k8s
  become: true
  gather_facts: true
  roles:
    - role: microk8s
