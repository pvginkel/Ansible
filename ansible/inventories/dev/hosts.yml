---
# Dev / workstation inventory. Used for the single-node dev k8s cluster and the
# Linux dev box. Much smaller than prd — most groups are empty.

all:
  children:

    k8s_dev:
      hosts:
        wrkdevk8s:

    workstations:
      hosts:
        wrkdev:

    scratch_vms:
      # Throwaway VMs created via Terraform for testing roles. Provisioned
      # by terraform/scratch; DNS entry scratch.home -> 10.1.0.34.
      hosts:
        scratch:

    k8s:
      children:
        k8s_dev:
