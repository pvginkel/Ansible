---
# Dev / workstation inventory. Used for the single-node dev k8s cluster and the
# Linux dev box. Much smaller than prd — most groups are empty.

all:
  children:

    k8s_dev:
      hosts:
        wrkdevk8s:

    workstations:
      hosts:
        wrkdev:

    scratch:
      # Throwaway VMs created via Terraform for testing roles.
      hosts: {}

    k8s:
      children:
        k8s_dev:
