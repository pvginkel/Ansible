---
# Phase 4 scratch microk8s cluster — disposable, used to exercise the role.
#
# CIDRs chosen to not collide with the prd cluster (172.16/16 + 172.17/16)
# or dev cluster (172.18/16 + 172.19/16) — see /work/KubernetesConfig/microk8s/
# for those — nor with the homelab LAN at 10.1.0.0/24.

# Same channel as prd; scratch tracks current LTS.
microk8s_channel: 1.32/stable

microk8s_cluster_cidr_v4: 172.20.0.0/16
microk8s_service_cidr_v4: 172.21.0.0/16
microk8s_cluster_cidr_v6: fda0::/64
microk8s_service_cidr_v6: fda1::/108

# Service-network gateway IP, included as an API-server SAN so clients
# addressing the API through the service network can verify TLS.
microk8s_extra_sans:
  - 172.21.0.1

# Addon set for scratch — exercises the role's enable path. metallb
# installs the controller; the role's metallb task then upserts the
# addon's pool/advertisement with the real range below.
microk8s_addons:
  - dns
  - helm
  - helm3
  - metrics-server
  - metallb

# Range for the role-owned pool. 10.99.99.0/24 is deliberately unrouted
# so scratch's L2 advertisement doesn't conflict with anything on the
# LAN — scratch only exercises that the resources reconcile cleanly,
# not that they allocate distinct address space.
microk8s_metallb_pool_addresses:
  - 10.99.99.1-10.99.99.5

microk8s_users:
  - pvginkel

# Cluster primary is elected at runtime by the role — see
# roles/microk8s/tasks/elect-primary.yml. Election picks the
# alphabetically-first node on greenfield (wrkscratchk8s1), and
# whichever existing in-cluster member is alphabetically first
# thereafter — so a rebuilt primary doesn't strand the survivor.
