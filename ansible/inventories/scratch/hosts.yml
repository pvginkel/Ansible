---
# Scratch inventory. The only host here is wrkscratch — the disposable
# Terraform-provisioned VM used to exercise roles. Everything else lives
# in inventories/prd. Keep this inventory the single place where the
# rule "breakage is free here" actually holds.

all:
  children:

    scratch:
      hosts:
        wrkscratch:

    # Mirrors prd's `managed` parent so playbooks/site.yml's
    # `hosts: managed` resolves under this inventory too.
    managed:
      children:
        scratch:
