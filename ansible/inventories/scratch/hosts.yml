---
# Scratch inventory. Disposable Terraform-provisioned VMs used to exercise
# roles — the only place where breakage is free. Everything else lives in
# inventories/prd. Today the set is two microk8s scratch nodes (Phase 4);
# the inventory shape mirrors prd's so site.yml's group selectors resolve
# the same way.

all:
  children:

    k8s_scratch:
      # Two-node microk8s scratch cluster — Phase 4 step 1/2 test bed.
      hosts:
        wrkscratchk8s1:
        wrkscratchk8s2:

    scratch:
      # Parent for everything in this inventory; lets a playbook target
      # `hosts: scratch` regardless of cluster role.
      children:
        k8s_scratch:

    # Mirrors prd's `managed` parent so playbooks/site.yml's
    # `hosts: managed` resolves under this inventory too.
    managed:
      children:
        scratch:

    # Mirrors prd's `k8s` convenience parent — the microk8s role and
    # group_vars/k8s.yml apply identically against scratch and prd.
    k8s:
      children:
        k8s_scratch:
