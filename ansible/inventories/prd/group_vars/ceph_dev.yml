---
# Single-node microceph co-located on srvk8sdev. Isolated dev storage so
# HelmCharts / TF-provider iteration stops churning RBD images and RGW
# users on the prod Ceph cluster. Sized tight on purpose — this node
# carries no persistent load (decisions.md "Environment mapping").

# Channel = Ceph RELEASE codename, not an Ubuntu release. squid = Ceph
# 19, a release ahead of prd's reef (Ceph 18), so dev soaks the next
# Ceph before prd moves — mirrors the k8s dev-ahead policy.
microceph_channel: squid/stable

microceph_single_node: true

# OSD on the dedicated raw disk at scsi1 (terraform/prd/vms.tf). scsi0
# is the rootfs; the OSD disk is deliberately NOT in
# managed_filesystems_volumes so it stays raw for BlueStore.
microceph_osd_scsi_index: 1

# Memory caps well below prd (2.5 GiB OSD / 1 GiB MDS on 10 GiB nodes).
# srvk8sdev shares 12 GiB with the control plane + dev workloads and
# sees almost no storage load, so cap hard. 1 GiB sits just above Ceph's
# ~896 MiB osd_memory_target floor.
microceph_osd_memory_target: 1073741824 # 1 GiB
microceph_mds_cache_memory_limit: 268435456 # 256 MiB

# Full parity with prd's storage surface for integration testing:
# object (RGW/S3), file (CephFS), and block (RBD).
microceph_enable_rgw: true
microceph_rgw_port: 80

microceph_enable_cephfs: true

# The HomelabTerraformProvider's `ceph_pool` is one name serving as both
# the RBD pool and the CephFS subvolume group, so `k8s` appears in both
# lists (slices/helm-tf-deploy-harness.md "Provider configuration per
# cluster"). Replaces the unused `rbd` pool from the initial bring-up.
microceph_rbd_pools:
  - k8s

microceph_cephfs_subvolume_groups:
  - k8s

# Identities for the dev k8s cluster's ceph-csi drivers and for the TF
# provider's Ceph connection. Keys are minted by Ceph — read with
# `ceph auth get-key client.<name>` and paste into the consumer
# (HelmCharts dev values carry inline dev secrets by design; the dev
# cluster is isolated and this storage is disposable).
microceph_cephx_users:
  # Single consolidated user backing the whole dev cluster's storage:
  # enough caps to manage RBD images on the k8s pool *and* CephFS
  # subvolumes on cephfs, so it serves both the HomelabTerraformProvider
  # connection and the ceph-csi rbd/cephfs drivers at once. This is the
  # only user wired up today; the scoped per-driver users below are
  # declared for a later split.
  - name: k8s
    caps:
      mon: profile rbd
      mgr: allow rw
      osd: profile rbd pool=k8s, allow rw tag cephfs data=cephfs
      mds: allow rw
  # ceph-csi rbd: one user for provisioner + nodeplugin, same shape as
  # the csi-rbd-dev user on prod Ceph that this microceph replaces.
  - name: csi-rbd-dev
    caps:
      mon: profile rbd
      mgr: allow rw
      osd: profile rbd pool=k8s
  # ceph-csi cephfs: provisioner + nodeplugin.
  - name: csi-cephfs-dev
    caps:
      mon: allow r
      mgr: allow rw
      osd: allow rw tag cephfs metadata=cephfs, allow rw tag cephfs data=cephfs
      mds: allow rw fsname=cephfs
  # HomelabTerraformProvider Ceph connection (homelab_rbd_image +
  # homelab_cephfs_subvolume). RBD needs mon/osd rbd profiles on the
  # k8s pool; subvolume management runs through the mgr volumes module.
  - name: tf-provider
    caps:
      mon: profile rbd
      mgr: allow rw
      osd: profile rbd pool=k8s

# Admin Ops API user for homelab_s3_storage — the HomelabTerraformProvider
# mints per-release buckets + scoped RGW users through this in the
# HelmCharts pipeline. Same single `k8s` identity as the cephx user above,
# keeping the dev cluster to one name across RBD/CephFS/RGW.
microceph_rgw_admin_users:
  - uid: k8s
    display_name: k8s storage admin
    caps: users=*;buckets=*
