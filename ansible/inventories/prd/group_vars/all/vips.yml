---
# Keepalived-managed virtual IPs fronting the internal HA clusters.
# One VIP per cluster — the service is implicit from the port behind
# it. Consumers reference these entries by name rather than pinning a
# node IP. Design: slices/internal-ha-vips.md.
#
# Each VIP is a static reservation outside the dnsmasq DHCP pool and
# is pinned as a dnsmasq static host entry (HelmCharts
# configs/prd/dnsmasq.yaml). `virtual_router_id` namespaces a
# cluster's VRRP traffic on the shared LAN — it MUST be unique across
# every VRRP group reachable on the LAN.
homelab_vips:
  kubernetes_api:
    hostname: kubernetes-api.home
    address: 10.1.0.37
    virtual_router_id: 51
  ceph:
    hostname: ceph.home
    address: 10.1.0.38
    virtual_router_id: 52
  openbao:
    hostname: secrets.home
    address: 10.1.0.39
    virtual_router_id: 53

# Shared VRRP authentication string, used by every VRRP group above.
# VRRPv2 PASS auth — max 8 characters; the secret crosses the wire in
# cleartext, so the VIP fabric is treated as LAN-internal.
#
# ansible-vault'd with the fleet vault passphrase (see
# docs/runbooks/operator-workstation.md). To rotate, re-encrypt from
# the ansible/ directory with the passphrase available via
# ANSIBLE_VAULT_PASSWORD_FILE:
#   ansible-vault encrypt_string --name vrrp_auth_password '<8-char-secret>'
vrrp_auth_password: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          38343963613133313431343865653061366335323761643039313961373432316462356133366432
          3931316462313337363332393265326233633864323834310a663465343066363536386132363136
          62643665306134656338383363393030303231663564326561656262386265636335363531326161
          3961323561666361330a613236326334613034386136346563373934313931326436303230393639
          6563
