---
# Standalone OS update class: unattended-upgrades + auto-reboot in a
# quiet window. Per-host reboot times are staggered in host_vars
# (srvvault1=03:30, srvvault2=04:00, srvvault3=04:30) so quorum
# survives one node rebooting, not two — see decisions.md
# "Stagger reboot windows across the four standalone service VMs".
baseline_os_update_class: standalone

# Static-netplan hosts on public DNS (8.8.8.8/8.8.4.4 for cold-boot
# independence — same rationale as the k8s_prd nodes). homelab dnsmasq
# isn't on the resolver path, so /etc/hosts pins every .home name an
# srvvaultN reaches at runtime:
#   - ca.home — step-ca, for ssh_host_cert + the openbao role's
#     internal_tls listener-leaf issuance.
#   - secrets.home — the leader-tracking VIP; clients on the node
#     itself hit this hostname (matches the TLS SAN).
#   - srvvault{1,2,3}.home — self + peers, for openbao's api_addr /
#     cluster_addr and the elect-bootstrap peer probes. IPs come from
#     each peer's host_vars network_devices (single source of truth);
#     baseline renders the block, openbao tasks resolve locally.
baseline_etc_hosts_entries:
  - "10.2.1.15 ca.home"
  - "{{ homelab_vips.openbao.address }} {{ homelab_vips.openbao.hostname }}"
  - "{{ hostvars.srvvault1.network_devices[0].addresses[0] | regex_replace('/.*', '') }} srvvault1.home srvvault1"
  - "{{ hostvars.srvvault2.network_devices[0].addresses[0] | regex_replace('/.*', '') }} srvvault2.home srvvault2"
  - "{{ hostvars.srvvault3.network_devices[0].addresses[0] | regex_replace('/.*', '') }} srvvault3.home srvvault3"

