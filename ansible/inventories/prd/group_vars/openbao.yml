# Pipelines reference Jenkins secrets dynamically — there's no
# enumerable manifest like iac/secrets.yaml or an ExternalSecret's
# remoteRefs to mirror — so the policy grants the consumer's whole
# prefix instead of each leaf. Cross-consumer isolation is preserved:
# the jenkins AppRole still cannot read kv/iac or kv/eso.
#
# kv/shared/* paths are enumerated explicitly per consumer (not a
# wildcard) — `kv/shared` carries cross-consumer values but each
# consumer reads only the leaves it actually needs. Jenkins consumes
# the RGW S3 user (artifact-upload pipelines) and the Wi-Fi password
# (firmware-burn pipelines).
openbao_jenkins_kv_paths:
  - jenkins/*
  - shared/ceph-rgw/s3
  - shared/wifi-iot

# ESO is the cross-cluster k8s consumer. The four kv/shared leaves are
# enumerated because kv/shared is read by three consumers (iac, jenkins,
# eso) and "which shared leaf each consumer gets" is a real per-consumer
# least-privilege line. kv/eso has no such boundary: ESO is the sole
# reader of the whole subtree and its job is to materialise every chart's
# secrets, so a per-chart whitelist grants the same working set as a glob
# while adding a silent-failure footgun (forget a line → SecretSyncError
# at deploy). Hence the per-cluster glob. The per-cluster split is the
# real boundary — the dev cluster is a separate trust domain with its
# own AppRole (eso-dev, below).
openbao_eso_kv_paths:
  - shared/ceph-rgw/s3
  - shared/samba/users
  - shared/jenkins/admin-password
  - shared/wifi-iot
  - eso/prd/*

# The dev cluster's ESO. Same glob rationale as eso above; no kv/shared
# leaves because no dev-cluster chart consumes one today — enumerate
# them here if that changes.
openbao_eso_dev_kv_paths:
  - eso/dev/*

# iac-impl reads /etc/iac/secrets.yaml on srviac and resolves any
# `!bao kv/iac/<leaf>#<key>` reference via this AppRole. Paths are
# enumerated explicitly so the policy mirrors the manifest exactly.
# Adding a new credential: bao kv put a new leaf, then add the path
# here and converge.
openbao_iac_agent_kv_paths:
  - iac/homeassistant
  - iac/jenkins-agent
  - iac/proxmox
  - iac/dns-reservation
  - iac/backup-server
  - iac/ansible-ssh-key

openbao_oidc_discovery_url: https://auth.ginbov.nl/realms/homelab
