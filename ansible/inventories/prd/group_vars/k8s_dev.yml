---
# Development microk8s cluster — single node (wrkdevk8s), used for
# HelmCharts iteration. Rebuilt in Phase 4a step 11 to settle the
# target CIDRs (live cluster CIDR is 10.3.0.0/16 today; the role's
# launch-config render is cosmetic until first init).
#
# Cluster and service CIDRs codified from
# /work/KubernetesConfig/microk8s/lc-dev.yaml.

# Target channel for k8s_dev. wrkdevk8s is currently pinned to
# 1.30/stable in host_vars until the Phase 4a step 11 rebuild — the
# rebuild lifts the override and the cluster lands here.
microk8s_channel: 1.32/stable

microk8s_cluster_cidr_v4: 172.18.0.0/16
microk8s_service_cidr_v4: 172.19.0.0/16
microk8s_cluster_cidr_v6: fd02::/64
microk8s_service_cidr_v6: fd99::/108

microk8s_extra_sans:
  - 172.19.0.1

# core/ingress excluded per decisions.md "Tool split": operator runs
# their own ingress controller. Live cluster has it enabled today;
# settles at the step 11 rebuild. ha-cluster auto-enabled by microk8s.
microk8s_addons:
  - dns
  - helm
  - helm3
  - metrics-server
  - dashboard
  - community
  - metallb

microk8s_users:
  - pvginkel

# Cluster primary is elected at runtime by the role — see
# roles/microk8s/tasks/elect-primary.yml. wrkdevk8s is the only node
# in the cluster, so election always picks it.

# MetalLB pool from /work/KubernetesConfig/metallb/dev.yaml.
microk8s_metallb_pool_addresses:
  - 10.1.2.1-10.1.2.199
  - 2a10:3781:565a:1:7912:b75a::/96

# Containerd registry mirrors. dev primarily pulls from the dev
# registry (image refs in HelmCharts dev configs carry the
# `registry-dev:5000/` prefix), but charts shared with prd may also
# reference `registry:5000/` directly — `registry.home` resolves via
# LAN DNS to the prd registry's LoadBalancer IP, and the mirror entry
# tells containerd to talk plain HTTP.
microk8s_registry_mirrors:
  - registry-dev:5000
  - registry:5000

# Node-local /etc/hosts entry. dev resolves the dev registry direct
# to its LAN address; no in-cluster service IP is involved on dev.
# Cold-boot independent because 192.168.178.43 is a stable LAN host.
microk8s_etc_hosts_entries:
  - "192.168.178.43 registry-dev"

# No CoreDNS hosts/templates on dev. A pre-rebuild cluster carries a
# stale `10.153.182.3 registry` hosts entry from the legacy service
# CIDR; the role's authoritative Corefile render drops it. Phase 4c
# rebuilds dev under the target CIDRs and from there the empty
# overrides are correct.
microk8s_coredns_hosts: []
microk8s_coredns_templates: []
