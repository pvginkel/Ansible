---
# Development microk8s cluster — single node (wrkdevk8s), HelmCharts
# iteration target. Canary track for both Kubernetes (latest stable
# microk8s channel) and the OS (see vms.tf `image_channel = "testing"`).

microk8s_channel: 1.36/stable

microk8s_cluster_cidr_v4: 172.18.0.0/16
microk8s_service_cidr_v4: 172.19.0.0/16
microk8s_cluster_cidr_v6: fd02::/64
microk8s_service_cidr_v6: fd99::/108

microk8s_extra_sans:
  - 172.19.0.1

# Homelab-CA TLS leaf for the kube-apiserver, served additively via the
# apiserver's SNI cert flag. wrkdevk8s is single-node with no VIP — the
# kubernetes-api-dev.home alias points straight at it. microk8s's own
# server.crt is untouched. See slices/internal-tls-step-ca.md §F.
microk8s_apiserver_homelab_sans:
  - kubernetes-api-dev
  - kubernetes-api-dev.home

# core/ingress excluded per decisions.md "Tool split": operator runs
# their own ingress controller. ha-cluster auto-enabled by microk8s.
# MetalLB excluded: installed via the HelmCharts metallb-system
# chart (configs/dev/metallb-system.sh) — dev pioneered the move
# off the addon to escape the upstream addon-vs-binary CRD drift in
# microk8s 1.36 and to keep the path open to FRR mode for prd's BGP
# rollout later. Pool + L2Advertisement live in
# charts/metallb-system/files/dev.yaml.
microk8s_addons:
  - dns
  - helm
  - helm3
  - metrics-server
  - community

microk8s_users:
  - pvginkel

# Cluster primary is elected at runtime by the role — see
# roles/microk8s/tasks/elect-primary.yml. wrkdevk8s is the only node
# in the cluster, so election always picks it.

# microk8s_metallb_pool_addresses is left empty (defaults/main.yml) —
# the role's metallb.yml reconcile skips on an empty list, leaving
# the HelmCharts install in charge.

# Containerd registry mirrors. dev primarily pulls from the dev
# registry (image refs in HelmCharts dev configs carry the
# `registry-dev:5000/` prefix), but charts shared with prd may also
# reference `registry:5000/` directly — `registry.home` resolves via
# LAN DNS to the prd registry's LoadBalancer IP, and the mirror entry
# tells containerd to talk plain HTTP.
microk8s_registry_mirrors:
  - registry-dev:5000
  - registry:5000

# Node-local /etc/hosts entry. dev resolves the dev registry direct
# to its LAN address; no in-cluster service IP is involved on dev.
# Cold-boot independent because 192.168.178.43 is a stable LAN host.
baseline_etc_hosts_entries:
  - "192.168.178.43 registry-dev"

# No CoreDNS hosts/templates on dev — single-node cluster doesn't
# need cross-node name pinning.
microk8s_coredns_hosts: []
microk8s_coredns_templates: []
