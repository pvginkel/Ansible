---
# Production microk8s cluster — 3 nodes (srvk8s1/2/3).
#
# Cluster and service CIDRs are codified from the launch-config the
# cluster bootstrapped against (originally /work/KubernetesConfig/
# microk8s/lc-prd.yaml, now retired); preserved so the role's render
# of .microk8s.yaml matches what's already on disk.

# Pinned per cluster per decisions.md "k8s version policy" so dev can
# soak a new minor independently before prd moves. Read by the role
# *and* by playbooks/update-k8s.yml — keep here, not in role defaults
# alone, so standalone playbooks resolve the channel without applying
# the role.
# Filesystem reconciliation. Overrides the pve_vms default to add the
# scsi1 = 80 GB data volume that backs /var/snap on every k8s_prd
# node — without this, microk8s containerd state piles up on the
# 19 GB scsi0 root and kubelet's image GC starts firing.
managed_filesystems_volumes:
  - scsi_index: 0
    mountpoint: /
    fstype: ext4
  - scsi_index: 1
    mountpoint: /var/snap
    fstype: ext4

microk8s_channel: 1.32/stable

microk8s_cluster_cidr_v4: 172.16.0.0/16
microk8s_service_cidr_v4: 172.17.0.0/16
microk8s_cluster_cidr_v6: fd01::/64
microk8s_service_cidr_v6: fd98::/108

# Service-network gateway IP — added as an API-server SAN so clients
# addressing the API through the service network can verify TLS.
microk8s_extra_sans:
  - 172.17.0.1

# kube-apiserver VIP. This 3-node cluster fronts the API at
# kubernetes-api.home (10.1.0.37) via Keepalived — see
# group_vars/all/vips.yml and slices/internal-ha-vips.md. Roll it onto
# the running nodes with playbooks/apply-k8s-vip.yml; rebuilt nodes
# pick it up through the microk8s role.
microk8s_manage_apiserver_vip: true

# core/registry excluded per decisions.md "Tool split": the operator
# runs their own registry, so the live `registry` addon stays enabled
# until disabled out-of-band (the role is additive — only enables
# what's in this list, never disables what isn't). ha-cluster is
# omitted because microk8s auto-enables it on multi-node join.
microk8s_addons:
  - dns
  - helm
  - helm3
  - metrics-server
  - dashboard
  - community
  - metallb

microk8s_users:
  - pvginkel

# Cluster primary is elected at runtime by the role — see
# roles/microk8s/tasks/elect-primary.yml.

# MetalLB pool from /work/KubernetesConfig/metallb/prd.yaml.
microk8s_metallb_pool_addresses:
  - 10.2.1.1-10.2.1.199
  - 2a10:3781:565a:0:7912:b75b::/96

# Containerd registry mirrors. The operator's in-cluster registry
# (ServiceIP 172.17.0.3, see microk8s_etc_hosts_entries below) and
# the dev-cluster registry (LAN-direct on the dev side) — prd pulls
# images tagged with both prefixes. Both are plain HTTP.
microk8s_registry_mirrors:
  - registry:5000
  - registry-dev:5000

# Node-local /etc/hosts entries. The registry alias must resolve
# without LAN DNS — the LAN's dnsmasq runs in-cluster behind the
# registry itself, so any chain that puts node DNS for `registry`
# through dnsmasq creates a cold-boot ordering failure. Hand-picked
# 172.17.0.3 lives outside the dynamic service-IP allocation range.
microk8s_etc_hosts_entries:
  - "172.17.0.3 registry"

# CoreDNS hosts overrides. In-cluster runtime references (Kaniko
# pushing builds, etc.) need bare `registry`/`registry.home` to
# resolve without going out to dnsmasq. The Ceph mon hostnames are
# here for the same chicken-and-egg: the registry container itself
# depends on Ceph storage to boot, and dnsmasq depends on the
# registry — Ceph addressing must therefore be resolvable from
# inside the cluster without touching the LAN DNS path. Ceph IPs
# are static infrastructure and never flow through the dynamic
# reservation API; the same triples live in HelmCharts
# configs/{prd,dev}/dnsmasq.yaml.
microk8s_coredns_hosts:
  - { ip: 172.17.0.3, names: [registry, registry.home] }
  - { ip: 10.1.0.38, names: [ceph, ceph.home] }
  - { ip: 10.1.0.24, names: [srvceph1, srvceph1.home] }
  - { ip: 10.1.0.25, names: [srvceph2, srvceph2.home] }
  - { ip: 10.1.0.26, names: [srvceph3, srvceph3.home] }

# CoreDNS A-record templates. Public hostnames that should resolve
# in-cluster to the local ingress LB (10.2.1.7 sits inside the
# MetalLB pool above) so traffic doesn't loop out through the WAN
# and back. Without these, in-cluster requests to webathome.org /
# ginbov.nl follow public DNS and the in-cluster path diverges
# from the outside-cluster path.
microk8s_coredns_templates:
  - { domain: webathome.org, answer_a: 10.2.1.7, ttl: 600 }
  - { domain: ginbov.nl, answer_a: 10.2.1.7, ttl: 600 }
