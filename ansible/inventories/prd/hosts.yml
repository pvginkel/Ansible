---
# Production inventory. Every host that must keep working lives here —
# prod and dev clusters alike, the operator workstation, the dev k8s
# node. Hosts *not* in this inventory: the disposable Terraform scratch
# VMs (inventories/scratch); they appear under pve_vms_unmanaged below
# so proxmox_host can still reconcile affinity for them.
#
# Two parent groups carry meaning:
# - `managed` is what `site.yml` plays roles against.
# - `pve_vms` is data-only — its members are read by the `proxmox_host`
#   role to reconcile per-VM CPU affinity. Membership in `pve_vms` does
#   not imply Ansible manages the guest OS.

all:
  children:

    proxmox:
      # 3 physical PVE nodes forming one cluster.
      hosts:
        pve:
        pve1:
        pve2:

    k8s_prd:
      # 3-node microk8s production cluster.
      hosts:
        srvk8s1:
        srvk8s2:
        srvk8s3:

    k8s_dev:
      # Single-node microk8s used for HelmCharts development. Production-
      # grade infrastructure even though its workloads are not.
      hosts:
        wrkdevk8s:

    ceph_prd:
      # 3-node microceph cluster.
      hosts:
        srvceph1:
        srvceph2:
        srvceph3:

    iac_agent:
      # IaC orchestrator VM — runs Terraform + Ansible against the
      # homelab via the `iac` shim and Jenkins inbound agent. Phase 1.
      hosts:
        srviac:

    workstations:
      # Operator workstation. Ansible-managed for baseline + dev-box
      # bits; the operator's day-to-day tools and dotfiles are theirs.
      hosts:
        wrkdev:

    # VMs hosted on the Proxmox cluster whose existence we record so
    # `proxmox_host` can reconcile affinity, but whose OS is not managed
    # from any inventory we own. The wrkscratchk8s* entries are here too
    # — their OS state lives in inventories/scratch, but their affinity
    # must be reconciled whenever they're running.
    pve_vms_unmanaged:
      hosts:
        srvhomeassistant:    # Home Assistant prod (out of scope per decisions.md)
        srvhassiodev:        # Home Assistant dev
        srvtest:
        wrkjava:
        wrktql:
        wrktql10:
        wrkmariska:
        wrkdevux:
        wrkdevwin:           # Windows VM (out of scope)
        wrkscratchk8s1:      # OS managed via inventories/scratch; affinity reconciled here
        wrkscratchk8s2:      # OS managed via inventories/scratch; affinity reconciled here

    # Targeted by site.yml. Add a host here if Ansible should apply roles to it.
    managed:
      children:
        proxmox:
        k8s_prd:
        k8s_dev:
        ceph_prd:
        workstations:
        iac_agent:

    # Read by the `proxmox_host` role on each PVE node to enumerate VMs
    # for affinity reconciliation. Every member must declare `vm_id`,
    # `pve_node`, and `workload_class` in host_vars.
    pve_vms:
      children:
        k8s_prd:
        k8s_dev:
        ceph_prd:
        workstations:
        pve_vms_unmanaged:
        iac_agent:
        # OpenBao hosts will join once Phase 3's deployment shape is
        # decided (single VM vs 3-node cluster).

    # Convenience parents.
    k8s:
      children:
        k8s_prd:
        k8s_dev:

    ceph:
      children:
        ceph_prd:
