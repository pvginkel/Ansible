---
vm_id: 912
pve_node: pve2
workload_class: background

# Carries ZFS pool zpool4 for the postgres-pas substrate. The label makes
# the iac-provisioner DaemonSet (which runs the host `zfs` for the provider)
# schedule here.
k8s_node_labels:
  homelab.local/storage: zpool4

# Empty ZFS pool on the scsi2 virtual disk (terraform/prd/vms.tf). The zfs
# role creates it create-if-absent; ZFS auto-mounts the pool's root dataset
# at /zpool4. local-lvm backed, so a VM rebuild wipes it and the role
# recreates the pool rather than importing it (no zpools_to_import).
zfs_pools:
  - name: zpool4
    scsi_index: 2
    mountpoint: /zpool4

# Per-VM NIC config — the single source of truth, read by both
# terraform/prd/vms.tf (via yamldecode) and the baseline netplan task.
# NIC order is load-bearing: [0] is the vmbr0 primary.
network_devices:
  - bridge: vmbr0
    mac_address: "02:A7:F3:03:90:00"
    addresses:
      - 10.1.0.29/16
      - 2a10:3781:16a9:1::29/64
    gateway: 10.1.0.1
    accept_ra: false
    nameservers:
      - 8.8.8.8
      - 8.8.4.4
  - bridge: vmbr0
    mac_address: "02:A7:F3:03:90:01"
    vlan_id: 2
    addresses:
      - 10.2.0.29/16
      - 2a10:3781:16a9::29/64
  - bridge: vmbr1
    mac_address: "02:A7:F3:03:90:02"
    addresses:
      - 192.168.188.29/24
      - fdd0:6a51:35de::29/64
