---
# PVE storage that holds vzdump backups for VMs on this node. Read by the
# per-VM Terraform modules to decide each managed disk's `backup=` flag:
# disks on a VM whose `pve_node` declares this attribute get backup=true,
# everything else (VMs on pve1/pve2, plus all passthrough disks) is
# backup=false. See /work/AnsibleSpecs/decisions.md "Backup".
pve_node_backup_datastore: local-backup

# /dev/sda is an intentional uncommitted spare — physically attached so
# a future use doesn't require recabling, but currently wiped and not
# bound to any VM. Inspection tools may flag it as "unused"; that's by
# design.
intentional_spare_disks:
  - /dev/sda
