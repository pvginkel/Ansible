---
# Workload-class → CPU core range for VMs hosted on `pve`. Read by the
# `proxmox_host` role to drive `qm set <vmid> --affinity <range>`. Only
# `pve` is core-zoned; `pve1`/`pve2` carry no equivalent map.
proxmox_workload_affinity_cores:
  interactive: "0-11"
  background: "12-19"

# /dev/sda is an intentional uncommitted spare — physically attached so
# a future use doesn't require recabling, but currently wiped and not
# bound to any VM. Inspection tools may flag it as "unused"; that's by
# design.
intentional_spare_disks:
  - /dev/sda
