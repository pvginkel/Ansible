---
vm_id: 919
workload_class: background

# Per-VM NIC config — the single source of truth, read by both
# terraform/prd/vms.tf (via yamldecode) and the baseline netplan task.
# srvk8sdev is hybrid: vmbr0 dynamic (DHCP via dnsmasq reservation),
# vmbr1 hand-curated on the 10 Gb backplane.
network_devices:
  - bridge: vmbr0
    mac_address: "02:A7:F3:03:97:00"
  - bridge: vmbr1
    mac_address: "02:A7:F3:03:97:01"
    addresses:
      - 192.168.188.17/24
      - fdd0:6a51:35de::17/64
