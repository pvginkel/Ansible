---
vm_id: 919
workload_class: background

# Declares that srvk8sdev has a ZFS pool names zpool1.
k8s_node_labels:
  homelab.local/storage: zpool1

# Empty ZFS pool on the scsi2 virtual disk (terraform/prd/vms.tf). The
# zfs role creates it create-if-absent; ZFS auto-mounts the pool's root
# dataset at /zpool1. No child datasets. The disk is local-lvm backed,
# so a dev VM rebuild wipes it and the role recreates the pool rather
# than importing it (contrast srvk8s1's passthrough zpool2 +
# zpools_to_import).
zfs_pools:
  - name: zpool1
    scsi_index: 2
    mountpoint: /zpool1

# Per-VM NIC config — the single source of truth, read by both
# terraform/prd/vms.tf (via yamldecode) and the baseline netplan task.
# srvk8sdev is hybrid: vmbr0 dynamic (DHCP via dnsmasq reservation),
# vmbr1 hand-curated on the 10 Gb backplane.
network_devices:
  - bridge: vmbr0
    mac_address: "02:A7:F3:03:97:00"
  - bridge: vmbr1
    mac_address: "02:A7:F3:03:97:01"
    addresses:
      - 192.168.188.17/24
      - fdd0:6a51:35de::17/64
