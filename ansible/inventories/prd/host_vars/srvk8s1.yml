---
vm_id: 910
pve_node: pve
workload_class: background

# Capability labels per decisions.md "k8s node capability labels".
# srvk8s1 is the only prd k8s node carrying labels (8 cores vs. 3 on
# the workers; ZFS passthrough as zpool2). The other two prd nodes
# have no labels — empty intent skips the role's reconcile.
k8s_node_labels:
  homelab.local/performance: high
  homelab.local/storage: zpool2

# zpool2 lives on the NVMe at scsi2 (passthrough declared in
# terraform/prd/vms.tf). rebuild-k8s.yml imports declared pools
# after microk8s join + cordon, before the DaemonSet readiness gate.
zpools_to_import:
  - zpool2

# Per-VM NIC config — the single source of truth, read by both
# terraform/prd/vms.tf (via yamldecode) and the baseline netplan task.
# NIC order is load-bearing: [0] is the vmbr0 primary.
network_devices:
  - bridge: vmbr0
    mac_address: "02:A7:F3:03:8E:00"
    addresses:
      - 10.1.0.27/16
      - 2a10:3781:16a9:1::27/64
    gateway: 10.1.0.1
    accept_ra: false
    nameservers:
      - 8.8.8.8
      - 8.8.4.4
  - bridge: vmbr0
    mac_address: "02:A7:F3:03:8E:01"
    vlan_id: 2
    addresses:
      - 10.2.0.27/16
      - 2a10:3781:16a9::27/64
  - bridge: vmbr1
    mac_address: "02:A7:F3:03:8E:02"
    addresses:
      - 192.168.188.27/24
      - fdd0:6a51:35de::27/64
