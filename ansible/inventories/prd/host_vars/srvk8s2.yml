---
vm_id: 911
pve_node: pve1
workload_class: background

# Carries ZFS pool zpool3 for the postgres-pas substrate. The label makes
# the iac-provisioner DaemonSet (which runs the host `zfs` for the provider)
# schedule here.
k8s_node_labels:
  homelab.local/storage: zpool3

# Empty ZFS pool on the scsi2 virtual disk (terraform/prd/vms.tf). The zfs
# role creates it create-if-absent; ZFS auto-mounts the pool's root dataset
# at /zpool3. local-lvm backed, so a VM rebuild wipes it and the role
# recreates the pool rather than importing it (no zpools_to_import).
zfs_pools:
  - name: zpool3
    scsi_index: 2
    mountpoint: /zpool3

# Per-VM NIC config — the single source of truth, read by both
# terraform/prd/vms.tf (via yamldecode) and the baseline netplan task.
# NIC order is load-bearing: [0] is the vmbr0 primary.
network_devices:
  - bridge: vmbr0
    mac_address: "02:A7:F3:03:8F:00"
    addresses:
      - 10.1.0.28/16
      - 2a10:3781:16a9:1::28/64
    gateway: 10.1.0.1
    accept_ra: false
    nameservers:
      - 8.8.8.8
      - 8.8.4.4
  - bridge: vmbr0
    mac_address: "02:A7:F3:03:8F:01"
    vlan_id: 2
    addresses:
      - 10.2.0.28/16
      - 2a10:3781:16a9::28/64
  - bridge: vmbr1
    mac_address: "02:A7:F3:03:8F:02"
    addresses:
      - 192.168.188.28/24
      - fdd0:6a51:35de::28/64
