---
vm_id: 911
pve_node: pve1
workload_class: background

# Per-VM NIC config — the single source of truth, read by both
# terraform/prd/vms.tf (via yamldecode) and the baseline netplan task.
# NIC order is load-bearing: [0] is the vmbr0 primary.
network_devices:
  - bridge: vmbr0
    mac_address: "02:A7:F3:03:8F:00"
    addresses:
      - 10.1.0.28/16
      - 2a10:3781:16a9:1::28/64
    gateway: 10.1.0.1
    accept_ra: false
    nameservers:
      - 8.8.8.8
      - 8.8.4.4
    search:
      - home
  - bridge: vmbr0
    mac_address: "02:A7:F3:03:8F:01"
    vlan_id: 2
    addresses:
      - 10.2.0.28/16
      - 2a10:3781:16a9::28/64
  - bridge: vmbr1
    mac_address: "02:A7:F3:03:8F:02"
    addresses:
      - 192.168.188.28/24
      - fdd0:6a51:35de::28/64
