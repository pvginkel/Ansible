[defaults]
# All paths are relative to this directory (ansible/).
inventory = ./inventories/prd
roles_path = ./roles
collections_path = ./collections
playbook_dir = ./playbooks

# Output
stdout_callback = default
result_format = yaml
callbacks_enabled = profile_tasks, timer
display_skipped_hosts = False
display_ok_hosts = True

# Behavior
host_key_checking = True
retry_files_enabled = False
forks = 10
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible-facts
fact_caching_timeout = 3600
interpreter_python = auto_silent

# Diff output on --check runs
diff_always = True

[privilege_escalation]
become = True
become_method = sudo
become_ask_pass = False

[ssh_connection]
pipelining = True
# Host-key verification is anchored on the per-config files in
# ./files/known_hosts.d/ (each terraform config writes its own). The user-level
# ~/.ssh/known_hosts is bypassed entirely so an ephemeral container without one
# behaves the same as a workstation that has one. ed25519 only — Terraform pins
# only the ed25519 host key on managed VMs; the rsa/ecdsa keys sshd auto-
# generates are non-deterministic and we don't want to negotiate them.
#
# IdentityFile/IdentitiesOnly are explicit so the iac container (where root
# has no ~/.ssh/config) finds the key. On wrkdev the same path resolves under
# the operator's $HOME — matches the workstation runbook's key placement.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o PreferredAuthentications=publickey -o "UserKnownHostsFile=files/known_hosts.d/prd files/known_hosts.d/scratch files/known_hosts.d/dev files/known_hosts.d/proxmox" -o GlobalKnownHostsFile=/dev/null -o HostKeyAlgorithms=ssh-ed25519 -o IdentityFile=~/.ssh/id_ed25519_ansible -o IdentitiesOnly=yes
