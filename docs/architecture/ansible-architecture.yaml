systemSoftware:
  # ─── SoftwareProduct catalog (bare-kebab) ────────────────────────────
  - id: ss:proxmox-ve
    label: Proxmox VE
    summary: Open-source server virtualization platform combining KVM hypervisor and LXC.
    introduced: 2026-05-28
    lifecycle: active
    stereotype: SoftwareProduct
    homepage: https://www.proxmox.com/en/proxmox-virtual-environment

  - id: ss:microk8s
    label: MicroK8s
    summary: Canonical's lightweight Kubernetes distribution. Singletons, snap-packaged.
    introduced: 2026-05-28
    lifecycle: active
    stereotype: SoftwareProduct
    homepage: https://microk8s.io/

  - id: ss:kubernetes
    label: Kubernetes
    summary: Open-source container orchestration platform. Upstream of MicroK8s.
    introduced: 2026-05-28
    lifecycle: active
    stereotype: SoftwareProduct
    homepage: https://kubernetes.io/

  - id: ss:microceph
    label: MicroCeph
    summary: Canonical's snap-packaged Ceph distribution for small clusters.
    introduced: 2026-05-28
    lifecycle: active
    stereotype: SoftwareProduct
    homepage: https://canonical.com/microceph

  - id: ss:ceph
    label: Ceph
    summary: Open-source distributed object/block/filesystem storage. Upstream of MicroCeph.
    introduced: 2026-05-28
    lifecycle: active
    stereotype: SoftwareProduct
    homepage: https://ceph.io/

  - id: ss:openbao
    label: OpenBao
    summary: Open-source fork of HashiCorp Vault for secret management.
    introduced: 2026-05-28
    lifecycle: active
    stereotype: SoftwareProduct
    homepage: https://openbao.org/

  - id: ss:haproxy
    label: HAProxy
    summary: Open-source TCP/HTTP load balancer and proxy.
    introduced: 2026-05-28
    lifecycle: active
    stereotype: SoftwareProduct
    homepage: https://www.haproxy.org/

  - id: ss:keepalived
    label: Keepalived
    summary: Linux daemon for IP failover (VRRP) and health-checked load balancing.
    introduced: 2026-05-28
    lifecycle: active
    stereotype: SoftwareProduct
    homepage: https://www.keepalived.org/

  - id: ss:prometheus-node-exporter
    label: Prometheus node_exporter
    summary: Prometheus exporter exposing hardware and OS metrics for *NIX hosts.
    introduced: 2026-05-28
    lifecycle: active
    stereotype: SoftwareProduct
    homepage: https://github.com/prometheus/node_exporter

  - id: ss:metallb
    label: MetalLB
    summary: Bare-metal load-balancer implementation for Kubernetes via L2 (ARP/NDP) or BGP advertisement.
    introduced: 2026-05-28
    lifecycle: active
    stereotype: SoftwareProduct
    homepage: https://metallb.universe.tf/

  - id: ss:iac
    label: iac shim
    summary: Homelab-specific Docker-driven shim that wraps Terraform and Ansible, fetches OpenBao secrets at invocation, and serializes concurrent runs via a file lock.
    introduced: 2026-05-28
    lifecycle: active
    stereotype: SoftwareProduct
    sourceRepository: git:pvginkel/IaCAgent

  # ─── Instances (composite) ──────────────────────────────────────────
